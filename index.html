<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão74 - Copa 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <script>
        const SUPABASE_URL = 'https://auwzjdjyaqvqvznpfvif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q9azk8hCILivYJXe4JEOSQ_WVEolBhg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // MAPA DO MATA-MATA DECLARADO NO TOPO
        const MAPA_MATA_MATA = {
            segundas: Array.from({length: 16}, (_, i) => ({ id: `M${i+1}`, tA: `16A_${i+1}`, tB: `16B_${i+1}`, d: 'A definir' })),
            oitavas: Array.from({length: 8}, (_, i) => ({ id: `O${i+1}`, tA: `Oitavas A_${i+1}`, tB: `Oitavas B_${i+1}`, d: 'A definir' })),
            quartas: Array.from({length: 4}, (_, i) => ({ id: `Q${i+1}`, tA: `Quartas A_${i+1}`, tB: `Quartas B_${i+1}`, d: 'A definir' })),
            semis: Array.from({length: 2}, (_, i) => ({ id: `S${i+1}`, tA: `Semi A_${i+1}`, tB: `Semi B_${i+1}`, d: 'A definir' })),
            finais: [
                { id: 'F2', tA: 'Perdedor Semi 1', tB: 'Perdedor Semi 2', d: '3º Lugar' },
                { id: 'F1', tA: 'Vencedor Semi 1', tB: 'Vencedor Semi 2', d: 'Grande Final' }
            ]
        };

        let currentUser = null;
        let todosJogos = [];
        let meusPalpites = [];
        let todosPerfis = [];
        let todosPalpitesBanco = [];

        let abaAtual = 'grupos'; 
        let modoVisaoGrupo = 'grupo'; 
        let filtroGrupoAtivo = 'A'; 
        let filtroDiaAtivo = ''; 
        let subFaseAtiva = 'segundas'; 
    </script>

    <header class="bg-blue-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic tracking-wider">BOLÃO74</h1>
                <p class="text-[9px] text-blue-300 font-bold uppercase tracking-widest">🏆 Edição Especial 2026</p>
            </div>
            <div id="user-info" class="text-right text-xs font-bold bg-blue-950/40 px-3 py-1.5 rounded-lg border border-blue-800/60">
                <span class="text-gray-300 block text-[9px] uppercase font-black">Participante</span>
                <span id="txt-user-name" class="text-blue-200">Carregando...</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-3">
        <nav class="flex gap-1 bg-white p-1 rounded-xl shadow-sm border mb-3 sticky top-20 z-40 justify-between select-none">
            <button onclick="mudarAba('grupos')" class="aba-btn flex-1 py-2.5 text-[10px] font-black rounded-lg transition-all" id="tab-grupos">GRUPOS</button>
            <button onclick="mudarAba('matamata')" class="aba-btn flex-1 py-2.5 text-[10px] font-black rounded-lg transition-all" id="tab-matamata">MATA-MATA</button>
            <button onclick="mudarAba('ranking')" class="aba-btn flex-1 py-2.5 text-[10px] font-black rounded-lg transition-all" id="tab-ranking">RANKING</button>
            <button onclick="mudarAba('regras')" class="aba-btn flex-1 py-2.5 text-[10px] font-black rounded-lg transition-all" id="tab-regras">REGRAS</button>
        </nav>

        <div id="controles-grupos" class="bg-white p-2 rounded-xl border mb-3 flex flex-col gap-2 shadow-sm">
            <div class="flex gap-1 w-full">
                <button onclick="mudarModoVisao('grupo')" id="btn-visao-grupo" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-blue-600 text-white shadow-sm transition-all">Visão Grupo</button>
                <button onclick="mudarModoVisao('dia')" id="btn-visao-dia" class="flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-gray-100 text-gray-500 transition-all">Visão por Data</button>
            </div>
            <div id="wrapper-seletor-grupo" class="overflow-x-auto no-scrollbar whitespace-nowrap py-1 gap-1 flex"></div>
        </div>

        <div id="controles-matamata" class="hidden bg-white p-1.5 rounded-xl border mb-4 shadow-sm w-full flex flex-row gap-1 justify-between md:justify-center md:gap-3 select-none overflow-hidden">
            <button onclick="selecionarSubFaseMataMata('segundas')" id="btn-sub-segundas" class="sub-fase-btn inline-block py-2 px-2 md:px-5 text-[10px] md:text-xs font-black uppercase tracking-tight transition-all rounded-lg border">16-Avos</button>
            <button onclick="selecionarSubFaseMataMata('oitavas')" id="btn-sub-oitavas" class="sub-fase-btn inline-block py-2 px-2 md:px-5 text-[10px] md:text-xs font-black uppercase tracking-tight transition-all rounded-lg border">Oitavas</button>
            <button onclick="selecionarSubFaseMataMata('quartas')" id="btn-sub-quartas" class="sub-fase-btn inline-block py-2 px-2 md:px-5 text-[10px] md:text-xs font-black uppercase tracking-tight transition-all rounded-lg border">Quartas</button>
            <button onclick="selecionarSubFaseMataMata('semis')" id="btn-sub-semis" class="sub-fase-btn inline-block py-2 px-2 md:px-5 text-[10px] md:text-xs font-black uppercase tracking-tight transition-all rounded-lg border">Semis</button>
            <button onclick="selecionarSubFaseMataMata('finais')" id="btn-sub-finais" class="sub-fase-btn inline-block py-2 px-2 md:px-5 text-[10px] md:text-xs font-black uppercase tracking-tight transition-all rounded-lg border">Finais</button>
        </div>

        <div id="view-conteudo" class="space-y-3"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-gray-100 via-gray-100 to-transparent z-40">
        <div class="max-w-md mx-auto">
            <button id="btn-salvar" onclick="salvarAlteracoes()" class="w-full bg-green-600 text-white font-black text-sm p-4 rounded-xl shadow-lg border border-green-700 uppercase tracking-wider hover:bg-green-700 active:scale-[0.98] transition-all">
                💾 SALVAR MEUS PALPITES
            </button>
        </div>
    </div>

    <div id="modal-auditoria" class="fixed inset-0 bg-slate-950/60 z-50 hidden flex items-center justify-center p-3">
        <div class="bg-gray-100 w-full max-w-md h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border">
            <div class="bg-blue-900 p-4 text-white flex justify-between items-center shadow">
                <div>
                    <h2 id="auditoria-titulo" class="font-black italic text-sm uppercase tracking-wide">Auditoria de Palpites</h2>
                    <p id="auditoria-sub" class="text-[9px] text-blue-200 font-bold uppercase tracking-wider"></p>
                </div>
                <button onclick="fecharAuditoria()" class="bg-blue-950/50 hover:bg-red-600 w-8 h-8 flex items-center justify-center rounded-full font-black text-xs transition-colors border border-blue-800/40">✕</button>
            </div>
            <div id="auditoria-corpo" class="flex-1 overflow-y-auto p-3 space-y-2.5"></div>
        </div>
    </div>

    <script>
        async function obterUsuarioLogado() {
            const urlParams = new URLSearchParams(window.location.search);
            const userParam = urlParams.get('user');
            
            if (!userParam) {
                document.body.innerHTML = `<div class="p-8 text-center text-red-600 font-bold">Erro de Autenticação: Parâmetro ?user=Nome não encontrado na URL.</div>`;
                return;
            }

            const { data, error } = await _supabase.from('perfis').select('*').ilike('nome', userParam.trim());
            if (error || !data || data.length === 0) {
                document.body.innerHTML = `<div class="p-8 text-center text-red-600 font-bold">Erro: Participante "${userParam}" não localizado no sistema.</div>`;
                return;
            }
            
            currentUser = data[0];
            document.getElementById('txt-user-name').innerText = currentUser.nome;
        }

        async function carregarDados() {
            if(!currentUser) await obterUsuarioLogado();

            const [jRes, pRes, rRes, allPalpRes] = await Promise.all([
                _supabase.from('jogos').select('*').order('data_hora', { ascending: true }),
                _supabase.from('palpites').select('*').eq('user_id', currentUser.id),
                _supabase.from('perfis').select('*').order('pontos_total', { ascending: false }),
                _supabase.from('palpites').select('*')
            ]);

            todosJogos = jRes.data || [];
            meusPalpites = pRes.data || [];
            todosPerfis = rRes.data || [];
            todosPalpitesBanco = allPalpRes.data || [];

            configurarFiltrosDias();
            renderizarFiltrosGruposEAlvos();
            renderizarConteudo();
        }

        function configurarFiltrosDias() {
            const diasUnicos = [...new Set(todosJogos.filter(j => j.fase && j.fase.includes('Grupo')).map(j => j.data_hora.split('T')[0]))];
            if (diasUnicos.length > 0 && !filtroDiaAtivo) {
                filtroDiaAtivo = diasUnicos[0];
            }
        }

        function renderizarFiltrosGruposEAlvos() {
            const wrapper = document.getElementById('wrapper-seletor-grupo');
            if(!wrapper) return;
            wrapper.innerHTML = '';

            if (modoVisaoGrupo === 'grupo') {
                ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'].forEach(g => {
                    const ativo = filtroGrupoAtivo === g;
                    wrapper.innerHTML += `
                        <button onclick="definirSubFiltroGrupo('${g}')" class="px-4 py-2 rounded-lg text-xs font-black transition-all ${ativo ? 'bg-blue-600 text-white shadow-sm' : 'bg-gray-100 text-gray-500'}">
                            GRP ${g}
                        </button>`;
                });
            } else {
                const diasUnicos = [...new Set(todosJogos.filter(j => j.fase && j.fase.includes('Grupo')).map(j => j.data_hora.split('T')[0]))];
                diasUnicos.forEach(d => {
                    const ativo = filtroDiaAtivo === d;
                    const dataFormatada = d.split('-')[2] + '/' + d.split('-')[1];
                    wrapper.innerHTML += `
                        <button onclick="definirSubFiltroDia('${d}')" class="px-3 py-2 rounded-lg text-xs font-black transition-all ${ativo ? 'bg-blue-600 text-white shadow-sm' : 'bg-gray-100 text-gray-500'}">
                            📅 ${dataFormatada}
                        </button>`;
                });
            }
        }

        function definirSubFiltroGrupo(g) { filtroGrupoAtivo = g; renderizarFiltrosGruposEAlvos(); renderizarConteudo(); }
        function definirSubFiltroDia(d) { filtroDiaAtivo = d; renderizarFiltrosGruposEAlvos(); renderizarConteudo(); }

        function mudarModoVisao(modo) {
            modoVisaoGrupo = modo;
            document.getElementById('btn-visao-grupo').className = modo === 'grupo' ? 'flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-blue-600 text-white shadow-sm' : 'flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-gray-100 text-gray-500';
            document.getElementById('btn-visao-dia').className = modo === 'dia' ? 'flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-blue-600 text-white shadow-sm' : 'flex-1 py-2 text-[10px] font-black uppercase rounded-lg bg-gray-100 text-gray-500';
            renderizarFiltrosGruposEAlvos();
            renderizarConteudo();
        }

        function mudarAba(nome) {
            abaAtual = nome;
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${nome}`).classList.add('tab-active');
            
            document.getElementById('controles-grupos').style.display = nome === 'grupos' ? 'flex' : 'none';
            
            const painelMataMata = document.getElementById('controles-matamata');
            if (nome === 'matamata') {
                painelMataMata.classList.remove('hidden');
                painelMataMata.classList.add('flex');
                selecionarSubFaseMataMata(subFaseAtiva);
            } else {
                painelMataMata.classList.remove('flex');
                painelMataMata.classList.add('hidden');
            }
            
            document.getElementById('btn-salvar').style.display = (nome === 'ranking' || nome === 'regras') ? 'none' : 'block';
            renderizarConteudo();
        }

        function selecionarSubFaseMataMata(faseSelecionada) {
            subFaseAtiva = faseSelecionada;
            document.querySelectorAll('.sub-fase-btn').forEach(btn => {
                btn.className = "sub-fase-btn inline-block py-2 px-2 md:px-5 text-[10px] md:text-xs font-black uppercase tracking-tight transition-all bg-gray-100 border-gray-200 text-gray-600 rounded-lg";
            });
            
            const btnAtivo = document.getElementById(`btn-sub-${faseSelecionada}`);
            if (btnAtivo) {
                btnAtivo.className = "sub-fase-btn inline-block py-2 px-2 md:px-5 text-[10px] md:text-xs font-black uppercase tracking-tight transition-all bg-blue-600 border-blue-700 text-white rounded-lg shadow-sm";
            }
            renderizarConteudo();
        }

        function renderizarConteudo() {
            const container = document.getElementById('view-conteudo');
            if(!container) return;
            container.innerHTML = '';
            
            if (abaAtual === 'ranking') return renderizarRanking();
            if (abaAtual === 'regras') return renderizarRegras();
            
            let jogosFiltrados = [];
            if (abaAtual === 'grupos') {
                if (modoVisaoGrupo === 'grupo') {
                    jogosFiltrados = todosJogos.filter(j => j.fase === `Grupo ${filtroGrupoAtivo}`);
                } else {
                    jogosFiltrados = todosJogos.filter(j => j.fase && j.fase.includes('Grupo') && j.data_hora.startsWith(filtroDiaAtivo));
                }
                container.innerHTML = jogosFiltrados.map(j => cardJogo(j, j.time_a, j.time_b, formatarDataHora(j.data_hora), j.id)).join('');
            } else {
                const config = MAPA_MATA_MATA[subFaseAtiva] || [];
                container.innerHTML = config.map(c => {
                    const jogo = todosJogos.find(j => j.fase && j.fase.includes(c.id));
                    return cardJogo(jogo, c.tA, c.tB, c.d, c.id);
                }).join('');
            }
        }

        function cardJogo(jogo, timeA, timeB, infoData, idFalso) {
            const idReal = jogo ? jogo.id : null;
            const idMapeamento = idReal || `fake-${idFalso}`;
            
            const palp = idReal ? meusPalpites.find(p => p.jogo_id === idReal) : null;
            const valA = palp ? palp.palpite_a : '';
            const valB = palp ? palp.palpite_b : '';
            
            const oficialA = jogo && jogo.gols_a_oficial !== null ? jogo.gols_a_oficial : '-';
            const oficialB = jogo && jogo.gols_b_oficial !== null ? jogo.gols_b_oficial : '-';
            
            const estaBloqueado = jogo ? verificarJogoBloqueado(jogo.data_hora) : true;
            
            let pontosGerados = 0;
            let badgeCor = 'bg-gray-100 text-gray-400';
            
            if (jogo && jogo.gols_a_oficial !== null && jogo.gols_b_oficial !== null && palp) {
                let pontosBase = 0;
                if (palp.palpite_a === jogo.gols_a_oficial && palp.palpite_b === jogo.gols_b_oficial) {
                    pontosBase = 25; badgeCor = 'bg-green-600 text-white';
                } else if (jogo.gols_a_oficial !== jogo.gols_b_oficial && Math.sign(palp.palpite_a - palp.palpite_b) === Math.sign(jogo.gols_a_oficial - jogo.gols_b_oficial) && (palp.palpite_a - palp.palpite_b) === (jogo.gols_a_oficial - jogo.gols_b_oficial)) {
                    pontosBase = 18; badgeCor = 'bg-blue-600 text-white';
                } else if (Math.sign(palp.palpite_a - palp.palpite_b) === Math.sign(jogo.gols_a_oficial - jogo.gols_b_oficial)) {
                    pontosBase = 15; badgeCor = 'bg-indigo-600 text-white';
                } else if (palp.palpite_a === jogo.gols_a_oficial || palp.palpite_b === jogo.gols_b_oficial) {
                    pontosBase = 3; badgeCor = 'bg-gray-500 text-white';
                }

                let peso = 1.0;
                if (jogo.fase && jogo.fase.includes('segundas')) peso = 1.2;
                else if (jogo.fase && jogo.fase.includes('oitavas')) peso = 1.5;
                else if (jogo.fase && jogo.fase.includes('quartas')) peso = 2.0;
                else if (jogo.fase && jogo.fase.includes('semis')) peso = 2.5;
                else if (jogo.fase && jogo.fase.includes('finais')) peso = 3.0;

                pontosGerados = Math.round(pontosBase * peso);
            }

            return `
                <div class="bg-white rounded-xl shadow-sm border p-3 flex flex-col relative overflow-hidden">
                    <div class="flex justify-between items-center text-[9px] font-black uppercase text-gray-400 tracking-wider mb-2 border-b pb-1">
                        <span>${infoData}</span>
                        <span>${jogo && jogo.fase ? jogo.fase : 'Mata-Mata'}</span>
                    </div>
                    
                    <div class="grid grid-cols-7 items-center justify-center gap-1">
                        <div class="col-span-2 text-right font-black text-xs text-slate-800 uppercase tracking-tight truncate">${timeA}</div>
                        <div class="col-span-3 flex items-center justify-center gap-1 bg-gray-50 p-1.5 rounded-lg border">
                            <input type="number" id="g-a-${idMapeamento}" value="${valA}" ${estaBloqueado ? 'disabled' : ''} class="w-8 h-8 bg-white border text-center font-black text-xs rounded-md shadow-inner outline-none focus:ring-2 ring-blue-500 text-slate-800">
                            <span class="text-[9px] font-black text-gray-400 uppercase">x</span>
                            <input type="number" id="g-b-${idMapeamento}" value="${valB}" ${estaBloqueado ? 'disabled' : ''} class="w-8 h-8 bg-white border text-center font-black text-xs rounded-md shadow-inner outline-none focus:ring-2 ring-blue-500 text-slate-800">
                        </div>
                        <div class="col-span-2 text-left font-black text-xs text-slate-800 uppercase tracking-tight truncate">${timeB}</div>
                    </div>

                    <div class="flex justify-between items-center mt-2 pt-1 border-t border-dashed">
                        <div class="text-[9px] font-bold text-gray-400 flex items-center gap-1">
                            Placar Oficial: <span class="bg-slate-200 text-slate-800 px-1.5 py-0.5 rounded font-black text-xs">${oficialA} x ${oficialB}</span>
                        </div>
                        ${jogo && jogo.gols_a_oficial !== null ? `<div class="${badgeCor} text-[9px] font-black uppercase px-2 py-0.5 rounded-md shadow-sm">+${pontosGerados} Pts</div>` : ''}
                    </div>
                </div>
            `;
        }

        function verificarJogoBloqueado(dataHoraIso) {
            if(!dataHoraIso) return true;
            const agora = new Date();
            const limite = new Date(new Date(dataHoraIso).getTime() - (5 * 60 * 1000));
            return agora >= limite;
        }

        function formatarDataHora(iso) {
            if(!iso) return '';
            const d = new Date(iso);
            return d.toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'}) + ' - ' + d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        }

        async function salvarAlteracoes() {
            const upserts = [];
            const idsParaDeletar = [];
            const inputsA = document.querySelectorAll('input[id^="g-a-"]');
            
            inputsA.forEach(inputA => {
                if(inputA.id.includes('fake') || inputA.disabled) return;
                
                const idJ = inputA.id.replace('g-a-', '');
                const vA = inputA.value;
                const vB = document.getElementById(`g-b-${idJ}`).value;

                if (vA === '' && vB === '') {
                    idsParaDeletar.push(idJ);
                } else if (vA !== '' && vB !== '') {
                    upserts.push({
                        user_id: currentUser.id, 
                        jogo_id: idJ, 
                        palpite_a: parseInt(vA), 
                        palpite_b: parseInt(vB)
                    });
                }
            });

            try {
                if (idsParaDeletar.length > 0) {
                    await _supabase.from('palpites').delete().eq('user_id', currentUser.id).in('jogo_id', idsParaDeletar);
                }
                if (upserts.length > 0) {
                    const { error } = await _supabase.from('palpites').upsert(upserts, { onConflict: 'user_id,jogo_id' });
                    if (error) throw error;
                }
                alert("✅ Seus palpites foram updated com sucesso!");
                await carregarDados();
            } catch (e) {
                alert("Erro ao processar alterações: " + e.message);
            }
        }

        function renderizarRanking() {
            const container = document.getElementById('view-conteudo');
            let html = `
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                    <div class="bg-slate-900 p-3 text-white text-[10px] font-black uppercase tracking-wider flex justify-between">
                        <span>Posição / Participante</span>
                        <span>Pontos</span>
                    </div>
                    <div class="divide-y">
            `;

            todosPerfis.forEach((p, index) => {
                const medalha = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}º`;
                const eVoce = p.id === currentUser.id;
                
                html += `
                    <div onclick="abrirAuditoriaUsuario('${p.id}', '${p.nome}')" class="p-3 flex justify-between items-center hover:bg-gray-50 active:bg-gray-100 transition-colors cursor-pointer ${eVoce ? 'bg-blue-50/60 font-black' : ''}">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-black text-slate-400 w-6">${medalha}</span>
                            <span class="text-xs font-bold text-slate-800 uppercase tracking-tight">${p.nome} ${eVoce ? '<span class="text-[9px] bg-blue-600 text-white px-1.5 py-0.5 rounded ml-1 font-black uppercase">Você</span>' : ''}</span>
                        </div>
                        <span class="text-sm font-black text-slate-900">${p.pontos_total || 0}</span>
                    </div>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function abrirAuditoriaUsuario(userId, userName) {
            document.getElementById('auditoria-titulo').innerText = `Palpites de ${userName}`;
            document.getElementById('auditoria-sub').innerText = `Criptografia de Auditoria Ponta-a-Ponta Ativa`;
            const corpo = document.getElementById('auditoria-corpo');
            if(!corpo) return;
            corpo.innerHTML = '';
            
            const jogosComResultado = todosJogos.filter(j => j.gols_a_oficial !== null && j.gols_b_oficial !== null);
            if(jogosComResultado.length === 0) {
                corpo.innerHTML = `<div class="p-6 text-center text-xs font-bold text-gray-400 uppercase">Nenhum resultado oficial lançado até o momento.</div>`;
                document.getElementById('modal-auditoria').classList.remove('hidden');
                return;
            }

            jogosComResultado.forEach(j => {
                const palp = todosPalpitesBanco.find(p => p.jogo_id === j.id && p.user_id === userId);
                const txtPalpA = palp ? palp.palpite_a : '-';
                const txtPalpB = palp ? palp.palpite_b : '-';
                
                let pontosGerados = 0;
                let badgeCor = 'bg-gray-200 text-gray-400';
                let rotuloResultado = 'Nenhum Palpite';

                if (palp) {
                    let pontosBase = 0;
                    if (palp.palpite_a === j.gols_a_oficial && palp.palpite_b === j.gols_b_oficial) {
                        pontosBase = 25; badgeCor = 'bg-green-600 text-white'; rotuloResultado = 'Placar Exato';
                    } else if (j.gols_a_oficial !== j.gols_b_oficial && Math.sign(palp.palpite_a - palp.palpite_b) === Math.sign(j.gols_a_oficial - j.gols_b_oficial) && (palp.palpite_a - palp.palpite_b) === (j.gols_a_oficial - j.gols_b_oficial)) {
                        pontosBase = 18; badgeCor = 'bg-blue-600 text-white'; rotuloResultado = 'Vendedor + Saldo';
                    } else if (Math.sign(palp.palpite_a - palp.palpite_b) === Math.sign(j.gols_a_oficial - j.gols_b_oficial)) {
                        pontosBase = 15; badgeCor = 'bg-indigo-600 text-white'; rotuloResultado = 'Vencedor / Empate';
                    } else if (palp.palpite_a === j.gols_a_oficial || palp.palpite_b === j.gols_b_oficial) {
                        pontosBase = 3; badgeCor = 'bg-gray-500 text-white'; rotuloResultado = 'Gol Isolado';
                    } else {
                        rotuloResultado = 'Errou Tudo';
                    }

                    let peso = 1.0;
                    if (j.fase && j.fase.includes('segundas')) peso = 1.2;
                    else if (j.fase && j.fase.includes('oitavas')) peso = 1.5;
                    else if (j.fase && j.fase.includes('quartas')) peso = 2.0;
                    else if (j.fase && j.fase.includes('semis')) peso = 2.5;
                    else if (j.fase && j.fase.includes('finais')) peso = 3.0;

                    pontosGerados = Math.round(pontosBase * peso);
                }

                corpo.innerHTML += `
                    <div class="bg-white p-3 rounded-xl border shadow-sm flex flex-col">
                        <div class="flex justify-between items-center text-[8px] font-black uppercase text-gray-400 mb-1.5 border-b pb-1">
                            <span>${j.fase}</span>
                            <span class="text-slate-600 font-bold bg-slate-100 px-1 rounded">Oficial: ${j.gols_a_oficial} x ${j.gols_b_oficial}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="text-xs font-bold text-slate-800 uppercase tracking-tight truncate">
                                ${j.time_a} <span class="bg-slate-900 text-white px-1.5 py-0.5 rounded font-black text-xs mx-1">${txtPalpA}</span> x <span class="bg-slate-900 text-white px-1.5 py-0.5 rounded font-black text-xs mx-1">${txtPalpB}</span> ${j.time_b}
                            </div>
                            <div class="${badgeCor} text-[8px] font-black uppercase px-2 py-1 rounded-md shadow-sm">
                                ${rotuloResultado} (+${pontosGerados} Pts)
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('modal-auditoria').classList.remove('hidden');
        }

        function fecharAuditoria() { document.getElementById('modal-auditoria').classList.add('hidden'); }
