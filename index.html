<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão74 - Copa 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-24">

    <script>
        const SUPABASE_URL = 'https://auwzjdjyaqvqvznpfvif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q9azk8hCILivYJXe4JEOSQ_WVEolBhg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>

    <header class="bg-blue-700 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic">BOLÃO74</h1>
            <div id="auth-header" class="text-[10px] font-bold uppercase tracking-widest"></div>
        </div>
    </header>

    <div id="login-screen" class="container mx-auto px-4 mt-10 max-w-sm">
        <div class="bg-white p-8 rounded-2xl shadow-xl border">
            <h2 class="text-xl font-black mb-6 text-center italic text-gray-800">ENTRAR NO BOLÃO</h2>
            <input type="text" id="usuario" placeholder="Nome de Usuário" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 ring-blue-500 font-bold text-center">
            <input type="password" id="password" placeholder="Sua Senha" class="w-full p-4 border rounded-xl mb-6 outline-none focus:ring-2 ring-blue-500 font-bold text-center">
            <button onclick="handleAuthSimplificado()" class="w-full bg-blue-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700">ENTRAR</button>
        </div>
    </div>

    <div id="main-content" class="hidden container mx-auto px-2 mt-4 max-w-2xl">
        
        <nav class="flex overflow-x-auto gap-1 bg-white p-1 rounded-xl shadow-sm border mb-4 no-scrollbar sticky top-20 z-40">
            <button onclick="mudarAba('grupos')" class="aba-btn px-3 py-2 text-[9px] font-black rounded-lg transition-all" id="tab-grupos">GRUPOS</button>
            <button onclick="mudarAba('segundas')" class="aba-btn px-3 py-2 text-[9px] font-black rounded-lg transition-all" id="tab-segundas">16-AVOS</button>
            <button onclick="mudarAba('oitavas')" class="aba-btn px-3 py-2 text-[9px] font-black rounded-lg transition-all" id="tab-oitavas">OITAVAS</button>
            <button onclick="mudarAba('quartas')" class="aba-btn px-3 py-2 text-[9px] font-black rounded-lg transition-all" id="tab-quartas">QUARTAS</button>
            <button onclick="mudarAba('semis')" class="aba-btn px-3 py-2 text-[9px] font-black rounded-lg transition-all" id="tab-semis">SEMIS</button>
            <button onclick="mudarAba('finais')" class="aba-btn px-3 py-2 text-[9px] font-black rounded-lg transition-all" id="tab-finais">FINAIS</button>
            <button onclick="mudarAba('ranking')" class="aba-btn px-3 py-2 text-[9px] font-black rounded-lg transition-all" id="tab-ranking">RANKING</button>
        </nav>

        <div id="controles-grupos" class="flex gap-2 mb-4">
            <button onclick="setVisaoGrupo('grupo')" id="btn-visao-grupo" class="flex-1 bg-blue-600 text-white text-[9px] font-bold py-2 rounded-lg">VISÃO GRUPOS</button>
            <button onclick="setVisaoGrupo('dia')" id="btn-visao-dia" class="flex-1 bg-gray-200 text-gray-500 text-[9px] font-bold py-2 rounded-lg">VISÃO POR DIA</button>
        </div>

        <div id="view-conteudo" class="space-y-4"></div>

        <button onclick="salvarTodosPalpites()" id="btn-salvar" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-green-500 text-white font-black py-4 rounded-2xl shadow-2xl z-50">SALVAR PALPITES</button>
    </div>

    <script>
        let currentUser = null;
        let todosJogos = [];
        let meusPalpites = [];
        let abaAtual = 'grupos';
        let visaoGrupo = 'grupo';

        const MAPA_MATA_MATA = {
            "segundas": [{id:"J73",tA:"2A",tB:"2B",d:"28/06 16:00"},{id:"J74",tA:"1E",tB:"3ABCD",d:"29/06 17:30"},{id:"J75",tA:"1F",tB:"2C",d:"29/06 22:00"},{id:"J76",tA:"1C",tB:"2F",d:"29/06 14:00"},{id:"J77",tA:"1I",tB:"3CDFGH",d:"30/06 18:00"},{id:"J78",tA:"2E",tB:"2I",d:"30/06 14:00"},{id:"J79",tA:"1A",tB:"3CEFHI",d:"30/06 22:00"},{id:"J80",tA:"1L",tB:"3EHIJK",d:"01/07 13:00"},{id:"J81",tA:"1D",tB:"3BEFIJ",d:"01/07 21:00"},{id:"J82",tA:"1G",tB:"3AEHIJ",d:"01/07 17:00"},{id:"J83",tA:"2K",tB:"2L",d:"02/07 20:00"},{id:"J84",tA:"1H",tB:"2J",d:"02/07 16:00"},{id:"J85",tA:"1B",tB:"3EFGIJ",d:"03/07 00:00"},{id:"J86",tA:"1J",tB:"2H",d:"03/07 19:00"},{id:"J87",tA:"1K",tB:"3DEIJL",d:"03/07 22:30"},{id:"J88",tA:"2D",tB:"2G",d:"03/07 15:00"}],
            "oitavas": [{id:"J89",tA:"Venc J74",tB:"Venc J77",d:"04/07 18:00"},{id:"J90",tA:"Venc J73",tB:"Venc J75",d:"04/07 14:00"},{id:"J91",tA:"Venc J76",tB:"Venc J78",d:"05/07 17:00"},{id:"J92",tA:"Venc J79",tB:"Venc J80",d:"05/07 21:00"},{id:"J93",tA:"Venc J83",tB:"Venc J84",d:"06/07 16:00"},{id:"J94",tA:"Venc J81",tB:"Venc J82",d:"06/07 21:00"},{id:"J95",tA:"Venc J86",tB:"Venc J88",d:"07/07 13:00"},{id:"J96",tA:"Venc J85",tB:"Venc J87",d:"07/07 17:00"}],
            "quartas": [{id:"J97",tA:"Venc J89",tB:"Venc J90",d:"09/07 17:00"},{id:"J98",tA:"Venc J93",tB:"Venc J94",d:"10/07 16:00"},{id:"J99",tA:"Venc J91",tB:"Venc J92",d:"11/07 18:00"},{id:"J100",tA:"Venc J95",tB:"Venc J96",d:"11/07 22:00"}],
            "semis": [{id:"J101",tA:"Venc J97",tB:"Venc J98",d:"14/07 16:00"},{id:"J102",tA:"Venc J99",tB:"Venc J100",d:"15/07 16:00"}],
            "finais": [{id:"J103",tA:"Perd J101",tB:"Perd J102",d:"18/07 18:00"},{id:"J104",tA:"Venc J101",tB:"Venc J102",d:"19/07 16:00"}]
        };

        async function handleAuthSimplificado() {
            const userLogin = document.getElementById('usuario').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;

            if(!userLogin || !pass) return alert("Preencha o Usuário e a Senha.");

            const { data: perfis, error } = await _supabase
                .from('perfis')
                .select('*')
                .eq('usuario_login', userLogin)
                .eq('senha_plana', pass);

            if(error || !perfis || perfis.length === 0) {
                return alert("Usuário ou senha incorretos!");
            }

            currentUser = perfis[0];
            initAppSimplificado();
        }

        function initAppSimplificado() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('auth-header').innerHTML = `${currentUser.nome_completo} | <button onclick="location.reload()" class="underline text-red-300">SAIR</button>`;
            carregarDados();
        }

        async function carregarDados() {
            const { data: j } = await _supabase.from('jogos').select('*').order('data_hora', { ascending: true });
            const { data: p } = await _supabase.from('palpites').select('*').eq('user_id', currentUser.id);
            todosJogos = j || []; meusPalpites = p || [];
            mudarAba(abaAtual); 
        }

        function mudarAba(nome) {
            abaAtual = nome;
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${nome}`).classList.add('tab-active');
            document.getElementById('controles-grupos').style.display = nome === 'grupos' ? 'flex' : 'none';
            document.getElementById('btn-salvar').style.display = nome === 'ranking' ? 'none' : 'block';
            renderizarConteudo();
        }

        function setVisaoGrupo(v) {
            visaoGrupo = v;
            document.getElementById('btn-visao-grupo').className = v === 'grupo' ? 'flex-1 bg-blue-600 text-white text-[9px] font-bold py-2 rounded-lg' : 'flex-1 bg-gray-200 text-gray-500 text-[9px] font-bold py-2 rounded-lg';
            document.getElementById('btn-visao-dia').className = v === 'dia' ? 'flex-1 bg-blue-600 text-white text-[9px] font-bold py-2 rounded-lg' : 'flex-1 bg-gray-200 text-gray-500 text-[9px] font-bold py-2 rounded-lg';
            renderizarConteudo();
        }

        function renderizarConteudo() {
            const container = document.getElementById('view-conteudo');
            container.innerHTML = '';
            if (abaAtual === 'ranking') return renderizarRanking();
            if (abaAtual === 'grupos') return renderizarGrupos();
            const config = MAPA_MATA_MATA[abaAtual] || [];
            container.innerHTML = config.map(c => {
                const jogo = todosJogos.find(j => j.fase.includes(c.id));
                return cardJogo(jogo, c.tA, c.tB, c.d, c.id);
            }).join('');
        }

        function renderizarGrupos() {
            const container = document.getElementById('view-conteudo');
            const jogosGrupos = todosJogos.filter(j => j.fase.includes('Grupo'));
            if (visaoGrupo === 'dia') {
                const dias = [...new Set(jogosGrupos.map(j => new Date(j.data_hora).toLocaleDateString()))];
                dias.forEach(d => {
                    container.innerHTML += `<h3 class="text-[10px] font-black text-gray-400 uppercase mt-4 mb-2 ml-1">📅 JOGOS DE ${d}</h3>`;
                    jogosGrupos.filter(j => new Date(j.data_hora).toLocaleDateString() === d).forEach(j => container.innerHTML += cardJogo(j));
                });
            } else {
                const nomesGrupos = [...new Set(jogosGrupos.map(j => j.fase))].sort();
                nomesGrupos.forEach(f => {
                    const games = jogosGrupos.filter(j => j.fase === f);
                    const rank = calcularRank(games);
                    container.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border p-4 mb-4">
                            <h3 class="text-blue-600 font-black italic text-xs mb-3 border-b pb-1 uppercase">${f}</h3>
                            <div class="space-y-2 mb-4">${games.map(j => cardJogo(j)).join('')}</div>
                            <table class="w-full text-[9px] uppercase font-bold text-gray-500">
                                <thead class="border-b"><tr class="text-[7px]">
                                    <th class="text-left py-1">Time</th><th class="text-center">P</th><th class="text-center">SG</th><th class="text-center">GP</th><th class="text-center">GC</th>
                                </tr></thead>
                                <tbody>${rank.map((t, i) => `
                                    <tr class="${i<2?'text-green-600 bg-green-50/50':''}">
                                        <td class="py-1.5">${i+1}º ${t.nome}</td>
                                        <td class="text-center text-gray-900">${t.pts}</td>
                                        <td class="text-center">${t.sg}</td>
                                        <td class="text-center text-blue-500">${t.gp}</td>
                                        <td class="text-center text-red-400">${t.gc}</td>
                                    </tr>`).join('')}
                                </tbody>
                            </table>
                        </div>`;
                });
            }
        }
        
        function cardJogo(j, sA="", sB="", dS="", idS="") {
            const existe = !!j;
            const bloqueado = existe ? (new Date(j.data_hora) - new Date()) / 60000 < 5 : true;
            const p = existe ? (meusPalpites.find(x => x.jogo_id === j.id) || {palpite_a:'', palpite_b:''}) : {palpite_a:'', palpite_b:''};
            const inputId = existe ? j.id : 'fake-' + idS;
            
            let dataFormatada = dS + ' (AGUARDANDO)';
            if (existe) {
                const dt = new Date(j.data_hora);
                dataFormatada = dt.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric'}) + ' - ' + dt.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            }

            // Exibição condicional da Tag de Grupo (só aparece se a aba não for a de grupos ou se a visão for por dia)
            const exibirTagGrupo = (abaAtual === 'grupos' && visaoGrupo === 'dia') || (abaAtual !== 'grupos');
            const tagGrupoHtml = (exibirTagGrupo && existe) ? `
                <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100 uppercase ml-auto">
                    ${j.fase}
                </span>
            ` : '';

            return `
                <div class="bg-white p-4 rounded-xl border ${bloqueado && existe ? 'opacity-60 grayscale' : 'border-l-4 border-l-blue-500'} mb-3 shadow-sm">
                    <div class="flex items-center justify-between border-b pb-2 mb-3 w-full">
                        <span class="text-[11px] font-black text-gray-700 uppercase tracking-wide bg-gray-100 px-2 py-1 rounded">
                            📅 ${dataFormatada}
                        </span>
                        ${tagGrupoHtml}
                    </div>
                    <div class="flex items-center justify-between gap-2">
                        <span class="flex-1 text-right font-black text-[13px] text-gray-800 truncate ${!existe?'text-gray-300':''}">${existe?j.time_a:sA}</span>
                        <div class="flex items-center gap-2">
                            <input type="number" id="p-a-${inputId}" value="${p.palpite_a}" ${bloqueado?'readonly':''} class="w-11 h-11 border rounded-xl text-center font-black text-xl ${bloqueado?'bg-gray-100 text-gray-400':'border-blue-200 text-blue-600 focus:ring-2 ring-blue-500 outline-none'}">
                            <span class="text-gray-200 font-bold">×</span>
                            <input type="number" id="p-b-${inputId}" value="${p.palpite_b}" ${bloqueado?'readonly':''} class="w-11 h-11 border rounded-xl text-center font-black text-xl ${bloqueado?'bg-gray-100 text-gray-400':'border-blue-200 text-blue-600 focus:ring-2 ring-blue-500 outline-none'}">
                        </div>
                        <span class="flex-1 text-left font-black text-[13px] text-gray-800 truncate ${!existe?'text-gray-300':''}">${existe?j.time_b:sB}</span>
                    </div>
                </div>`;
        }

        async function renderizarRanking() {
            // Busca os dados corrigidos usando o termo 'pontos_total'
            const { data, error } = await _supabase.from('perfis').select('*').order('pontos_total', { ascending: false });
            
            if (error) {
                console.error("Erro ao buscar ranking:", error.message);
            }

            document.getElementById('view-conteudo').innerHTML = `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden border">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr class="text-[10px] uppercase text-gray-400 font-bold">
                                <th class="p-4">Pos</th>
                                <th class="p-4">Nome</th>
                                <th class="p-4 text-right">Pts</th>
                            </tr>
                        </thead>
                        <tbody>${(data||[]).map((p, i) => `
                            <tr class="border-b ${currentUser && p.id === currentUser.id ? 'bg-blue-50/70 font-semibold border-l-4 border-l-blue-600' : ''}">
                                <td class="p-4 text-xs font-bold ${i===0?'text-amber-500':i===1?'text-gray-400':i===2?'text-amber-700':'text-gray-400'}">
                                    ${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1)}
                                </td>
                                <td class="p-4 text-gray-800 text-xs">
                                    ${p.nome_completo} ${currentUser && p.id === currentUser.id ? ' <span class="text-blue-600 font-bold">(Você)</span>' : ''}
                                </td>
                                <td class="p-4 text-right font-black text-blue-600 text-sm">${p.pontos_total || 0}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        function calcularRank(jogos) {
            const t = {};
            jogos.forEach(j => {
                [j.time_a, j.time_b].forEach(tm => { if(!t[tm]) t[tm] = {pts:0, v:0, sg:0, gp:0, gc:0, nome:tm}; });
                if(j.gols_a_oficial !== null) {
                    const ga = j.gols_a_oficial; const gb = j.gols_b_oficial;
                    t[j.time_a].gp += ga; t[j.time_a].gc += gb; t[j.time_a].sg += (ga-gb);
                    t[j.time_b].gp += gb; t[j.time_b].gc += ga; t[j.time_b].sg += (gb-ga);
                    if(ga>gb) { t[j.time_a].pts+=3; t[j.time_a].v++; }
                    else if(gb>ga) { t[j.time_b].pts+=3; t[j.time_b].v++; }
                    else { t[j.time_a].pts++; t[j.time_b].pts++; }
                }
            });
            return Object.values(t).sort((a,b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
        }

        async function salvarTodosPalpites() {
            const inputs = document.querySelectorAll('input[id^="p-a-"]');
            const upserts = [];
            const idsParaDeletar = [];
            
            inputs.forEach(iA => {
                if(iA.id.includes('fake') || iA.readOnly) return;
                
                const idJ = iA.id.replace('p-a-', '');
                const vA = iA.value;
                const elB = document.getElementById(`p-b-${idJ}`);
                
                if (!elB) return;
                const vB = elB.value;
                
                // Se ambos os campos forem limpos, adiciona na lista para deletar do banco
                if (vA === '' && vB === '') {
                    idsParaDeletar.push(idJ);
                } 
                // Se ambos estiverem preenchidos, joga no lote de salvar/atualizar
                else if (vA !== '' && vB !== '') {
                    upserts.push({
                        user_id: currentUser.id, 
                        jogo_id: idJ, 
                        palpite_a: parseInt(vA), 
                        palpite_b: parseInt(vB)
                    });
                }
            });

            try {
                // 1. Processa as exclusões de palpites que foram deixados em branco
                if (idsParaDeletar.length > 0) {
                    await _supabase
                        .from('palpites')
                        .delete()
                        .eq('user_id', currentUser.id)
                        .in('jogo_id', idsParaDeletar);
                }

                // 2. Processa os salvamentos e atualizações
                if (upserts.length > 0) {
                    const { error } = await _supabase.from('palpites').upsert(upserts, { onConflict: 'user_id,jogo_id' });
                    if (error) throw error;
                }

                alert("✅ Seus palpites foram atualizados com sucesso!");
                await carregarDados();
            } catch (e) {
                alert("Erro ao processar alterações: " + e.message);
                console.error(e);
            }
        }
        
        </script>
</body>
</html>
