<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIFA Engine Admin - Bolão74</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: white; background: rgba(59, 130, 246, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen">

    <div id="login-admin" class="max-w-sm mx-auto mt-20 bg-slate-900 p-8 rounded-2xl border border-slate-800 text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-6 italic text-blue-500 text-center">FIFA ENGINE</h2>
        <input type="password" id="senha-admin" value="" placeholder="Senha" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl mb-4 text-center text-xl outline-none">
        <button onclick="verificarSenha()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black transition-all">ENTRAR</button>
    </div>

    <div id="painel-admin" class="hidden">
        <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 p-4">
            <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-black italic uppercase">Admin <span class="text-blue-500">Bolão74</span></h1>
                <nav class="flex overflow-x-auto gap-2 p-1 bg-slate-950 rounded-xl border border-slate-800">
                    <button onclick="mudarAba('grupos')" class="aba-btn px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap" id="tab-grupos">GRUPOS</button>
                    <button onclick="mudarAba('tabelas')" class="aba-btn px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap" id="tab-tabelas">CLASSIFICAÇÃO</button>
                    <button onclick="mudarAba('matamata')" class="aba-btn px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap" id="tab-matamata">MATA-MATA (MAPA)</button>
                </nav>
                <button onclick="processarAtualizacao()" id="btn-main" class="bg-green-600 hover:bg-green-500 text-white font-black px-6 py-2 rounded-lg shadow-lg text-sm transition-all">
                    SALVAR E RECALCULAR
                </button>
            </div>
        </header>

        <main class="container mx-auto p-6">
            <div id="conteudo-grupos" class="aba-conteudo space-y-6">
                <div id="lista-grupos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>

            <div id="conteudo-tabelas" class="aba-conteudo hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

            <div id="conteudo-matamata" class="aba-conteudo hidden space-y-8">
                <div class="bg-blue-900/10 border border-blue-500/30 p-4 rounded-xl mb-6">
                    <h3 class="font-bold text-blue-400 italic">MAPA DA FASE FINAL</h3>
                    <p class="text-xs text-slate-400">O sistema sugere os confrontos conforme os resultados dos grupos são inseridos.</p>
                </div>
                <div id="lista-matamata" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://auwzjdjyaqvqvznpfvif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q9azk8hCILivYJXe4JEOSQ_WVEolBhg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const SENHA_MESTRA = "1234";

        let todosJogos = [];
        let classificacaoGlobal = {};

        function verificarSenha() {
            if(document.getElementById('senha-admin').value === SENHA_MESTRA) {
                sessionStorage.setItem('admin_logado', 'true');
                mostrarPainel();
            } else { alert("Senha Incorreta!"); }
        }

        if(sessionStorage.getItem('admin_logado') === 'true') { mostrarPainel(); }

        function mostrarPainel() {
            document.getElementById('login-admin').classList.add('hidden');
            document.getElementById('painel-admin').classList.remove('hidden');
            mudarAba('grupos');
            carregarDados();
        }

        function mudarAba(nome) {
            document.querySelectorAll('.aba-conteudo').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`conteudo-${nome}`).classList.remove('hidden');
            document.getElementById(`tab-${nome}`).classList.add('tab-active');
            if(nome === 'tabelas' || nome === 'matamata') atualizarLogicaTorneio();
        }

        async function carregarDados() {
            const { data } = await _supabase.from('jogos').select('*').order('data_hora', { ascending: true });
            todosJogos = data;
            renderizarGrupos();
        }

        function renderizarGrupos() {
            const container = document.getElementById('lista-grupos');
            const grupos = todosJogos.filter(j => j.fase.includes('Grupo'));
            container.innerHTML = grupos.map(j => cardJogo(j)).join('');
        }

        function cardJogo(j) {
            return `
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <div class="flex justify-between text-[9px] font-bold text-slate-500 mb-2">
                        <span>${j.fase}</span>
                        <span>${new Date(j.data_hora).toLocaleDateString()}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="flex-1 text-right font-bold text-sm truncate">${j.time_a}</span>
                        <input type="number" id="g-a-${j.id}" value="${j.gols_a_oficial ?? ''}" class="w-10 h-10 bg-slate-800 border border-slate-700 rounded text-center font-black text-blue-400">
                        <input type="number" id="g-b-${j.id}" value="${j.gols_b_oficial ?? ''}" class="w-10 h-10 bg-slate-800 border border-slate-700 rounded text-center font-black text-blue-400">
                        <span class="flex-1 text-left font-bold text-sm truncate">${j.time_b}</span>
                    </div>
                </div>`;
        }

        function atualizarLogicaTorneio() {
            // 1. Calcular Classificação de todos os Grupos
            const gruposFases = [...new Set(todosJogos.filter(j => j.fase.includes('Grupo')).map(j => j.fase))];
            classificacaoGlobal = {};

            gruposFases.forEach(fase => {
                const games = todosJogos.filter(j => j.fase === fase);
                const tabela = {};
                games.forEach(j => {
                    [j.time_a, j.time_b].forEach(t => { if(!tabela[t]) tabela[t] = {pts:0, sg:0, gp:0, nome:t}; });
                    const ga = parseInt(document.getElementById(`g-a-${j.id}`)?.value || j.gols_a_oficial);
                    const gb = parseInt(document.getElementById(`g-b-${j.id}`)?.value || j.gols_b_oficial);
                    if(!isNaN(ga) && !isNaN(gb)) {
                        tabela[j.time_a].gp += ga; tabela[j.time_a].sg += (ga-gb);
                        tabela[j.time_b].gp += gb; tabela[j.time_b].sg += (gb-ga);
                        if(ga>gb) tabela[j.time_a].pts+=3; else if(gb>ga) tabela[j.time_b].pts+=3; else {tabela[j.time_a].pts++; tabela[j.time_b].pts++;}
                    }
                });
                classificacaoGlobal[fase] = Object.values(tabela).sort((a,b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
            });

            // 2. Renderizar Tabelas
            const containerTabelas = document.getElementById('conteudo-tabelas');
            containerTabelas.innerHTML = Object.keys(classificacaoGlobal).map(fase => `
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h4 class="text-blue-500 font-bold mb-2 italic text-sm">${fase.toUpperCase()}</h4>
                    <table class="w-full text-[10px]">
                        ${classificacaoGlobal[fase].map((t, i) => `
                            <tr class="${i < 2 ? 'text-green-400' : 'text-slate-500'}">
                                <td class="py-1">${i+1}º ${t.nome}</td><td class="text-right font-bold">${t.pts}p</td>
                            </tr>
                        `).join('')}
                    </table>
                </div>
            `).join('');

            // 3. Renderizar Mata-Mata Sugerido
            const containerMM = document.getElementById('lista-matamata');
            const mmJogos = todosJogos.filter(j => !j.fase.includes('Grupo'));
            containerMM.innerHTML = mmJogos.map(j => cardJogo(j)).join('');
        }

        async function processarAtualizacao() {
            const btn = document.getElementById('btn-main');
            btn.innerText = "🔄 PROCESSANDO...";
            btn.disabled = true;
            try {
                for (let j of todosJogos) {
                    const ga = document.getElementById(`g-a-${j.id}`)?.value;
                    const gb = document.getElementById(`g-b-${j.id}`)?.value;
                    if (ga !== "" && gb !== "" && ga !== undefined) {
                        await _supabase.rpc('admin_atualizar_placar', { id_jogo: j.id, g_a: parseInt(ga), g_b: parseInt(gb) });
                    }
                }
                await _supabase.rpc('admin_recalcular_tudo');
                alert("✨ Sucesso! Resultados e Ranking atualizados.");
                await carregarDados();
            } catch (e) { alert("Erro: " + e.message); }
            btn.disabled = false;
            btn.innerText = "SALVAR E RECALCULAR";
        }
    </script>
</body>
</html>
