<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIFA Engine - Admin Bolão74</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: white; background: rgba(59, 130, 246, 0.1); }
        .bracket-line { border-left: 2px solid #334155; border-bottom: 2px solid #334155; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen">

    <div id="painel-admin" class="container mx-auto px-4 py-8">
        <header class="mb-8 border-b border-slate-800 pb-6 flex justify-between items-center">
            <h1 class="text-3xl font-black italic uppercase">FIFA Engine <span class="text-blue-500">2026</span></h1>
            <div class="flex gap-4">
                <button onclick="processarAtualizacao()" class="bg-green-600 px-6 py-2 rounded-lg font-bold hover:bg-green-500">SALVAR RESULTADOS</button>
            </div>
        </header>

        <nav class="flex overflow-x-auto gap-2 mb-8 bg-slate-900 p-2 rounded-2xl border border-slate-800 sticky top-4 z-50">
            <button onclick="mudarAba('resultados')" class="aba-btn p-3 rounded-lg font-bold" id="tab-resultados">GRUPOS</button>
            <button onclick="mudarAba('segundas')" class="aba-btn p-3 rounded-lg font-bold" id="tab-segundas">16-AVOS (J73-J88)</button>
            <button onclick="mudarAba('oitavas')" class="aba-btn p-3 rounded-lg font-bold" id="tab-oitavas">OITAVAS (J89-J96)</button>
            <button onclick="mudarAba('finais')" class="aba-btn p-3 rounded-lg font-bold" id="tab-finais">QUARTAS/SEMI/FINAL</button>
        </nav>

        <div id="conteudo-resultados" class="aba-conteudo space-y-4">
            <div id="lista-grupos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="conteudo-segundas" class="aba-conteudo hidden space-y-4">
            <div class="bg-amber-900/20 border border-amber-500/30 p-4 rounded-xl text-sm mb-4">
                Identifique os classificados nos grupos para que o sistema sugira os times aqui.
            </div>
            <div id="lista-segundas" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="conteudo-oitavas" class="aba-conteudo hidden grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div id="conteudo-finais" class="aba-conteudo hidden grid grid-cols-1 md:grid-cols-2 gap-4"></div>

    </div>

    <script>
        const SUPABASE_URL = 'https://auwzjdjyaqvqvznpfvif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q9azk8hCILivYJXe4JEOSQ_WVEolBhg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let todosJogos = [];
        // Mapeamento da FIFA conforme imagem (simplificado para J73-J104)
        const CHAVEAMENTO = {
            "J89": { de: ["J74", "J77"], fase: "Oitavas", data: "2026-06-30T18:00:00Z" },
            "J90": { de: ["J73", "J75"], fase: "Oitavas", data: "2026-07-04T14:00:00Z" },
            "J97": { de: ["J89", "J90"], fase: "Quartas", data: "2026-07-09T17:00:00Z" }
            // Adicione os outros J conforme a imagem para completar o mapa
        };

        async function carregarDados() {
            const { data } = await _supabase.from('jogos').select('*').order('data_hora', { ascending: true });
            todosJogos = data;
            renderizarTudo();
        }

        function renderizarTudo() {
            renderizarFase('Grupo', 'lista-grupos');
            renderizarMataMata('Segundas de final', 'lista-segundas');
            renderizarMataMata('Oitavas', 'lista-oitavas');
        }

        function renderizarFase(filtro, containerId) {
            const container = document.getElementById(containerId);
            if(!container) return;
            const jogos = todosJogos.filter(j => j.fase.includes(filtro));
            container.innerHTML = jogos.map(j => cardJogo(j)).join('');
        }

        function cardJogo(j) {
            const existeNoBanco = j.id && j.id.length > 10; // Verifica se é UUID real
            return `
                <div class="bg-slate-900 p-4 rounded-xl border ${existeNoBanco ? 'border-slate-800' : 'border-blue-500/50 bg-blue-900/10'}">
                    <div class="flex justify-between text-[10px] mb-2 font-bold">
                        <span class="text-blue-400">${j.fase}</span>
                        <span>${new Date(j.data_hora).toLocaleString()}</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="flex-1 text-right font-bold">${j.time_a}</span>
                        <input type="number" id="g-a-${j.id}" value="${j.gols_a_oficial ?? ''}" class="w-10 h-10 bg-slate-800 rounded text-center font-black">
                        <input type="number" id="g-b-${j.id}" value="${j.gols_b_oficial ?? ''}" class="w-10 h-10 bg-slate-800 rounded text-center font-black">
                        <span class="flex-1 font-bold">${j.time_b}</span>
                    </div>
                    ${!existeNoBanco ? `<button onclick="oficializarJogo('${j.time_a}', '${j.time_b}', '${j.fase}', '${j.data_hora}')" class="w-full mt-3 bg-blue-600 text-[10px] py-1 rounded font-bold uppercase">Criar Jogo no Bolão</button>` : ''}
                </div>`;
        }

        async function oficializarJogo(tA, tB, fase, data) {
            const { error } = await _supabase.from('jogos').insert([{ time_a: tA, time_b: tB, fase: fase, data_hora: data }]);
            if(!error) { alert("Jogo oficializado!"); carregarDados(); }
        }

        function mudarAba(nome) {
            document.querySelectorAll('.aba-conteudo').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`conteudo-${nome}`).classList.remove('hidden');
            document.getElementById(`tab-${nome}`).classList.add('tab-active');
        }

        async function processarAtualizacao() {
            // ... (mesma lógica de loop anterior para atualizar gols_a_oficial e gols_b_oficial)
            // Após atualizar, chama o RPC recalcular_tudo
        }

        carregarDados();
    </script>
</body>
</html>
</html>
