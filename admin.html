<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FIFA Engine Master - Bolão74 Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .tab-active { border-bottom: 4px solid #3b82f6; color: white; background: rgba(59, 130, 246, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen pb-20">

    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center flex-wrap gap-4">
            <h1 class="text-xl font-black italic text-blue-500">BOLÃO74 ADMIN</h1>
            <nav class="flex overflow-x-auto gap-1 bg-black p-1 rounded-lg no-scrollbar">
                <button onclick="mudarAba('grupos')" class="aba-btn px-3 py-1 text-[10px] font-bold rounded" id="tab-grupos">GRUPOS</button>
                <button onclick="mudarAba('matamata')" class="aba-btn px-3 py-1 text-[10px] font-bold rounded" id="tab-matamata">MATA-MATA</button>
                <button onclick="mudarAba('perfis')" class="aba-btn px-3 py-1 text-[10px] font-bold rounded" id="tab-perfis">CADASTRAR PARTICIPANTE</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-4xl">
        <section id="aba-grupos" class="secao space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl shadow-lg">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-800 pb-2">Seletor de Grupo</h2>
                <div class="flex flex-wrap gap-1.5" id="botoes-filtros-grupos"></div>
            </div>
            <div id="lista-jogos-grupos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="aba-matamata" class="secao hidden space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl shadow-lg">
                <h2 class="text-sm font-black text-slate-400 uppercase tracking-widest mb-3 border-b border-slate-800 pb-2">Fases do Mata-Mata</h2>
                <div class="flex flex-wrap gap-1.5">
                    <button onclick="filtrarMataMata('segundas')" id="btn-fase-segundas" class="fase-mm-btn px-4 py-2 bg-blue-600 text-white font-black text-xs rounded-lg transition-all shadow-md">16-AVOS</button>
                    <button onclick="filtrarMataMata('oitavas')" id="btn-fase-oitavas" class="fase-mm-btn px-4 py-2 bg-slate-800 text-slate-400 font-black text-xs rounded-lg transition-all">OITAVAS</button>
                    <button onclick="filtrarMataMata('quartas')" id="btn-fase-quartas" class="fase-mm-btn px-4 py-2 bg-slate-800 text-slate-400 font-black text-xs rounded-lg transition-all">QUARTAS</button>
                    <button onclick="filtrarMataMata('semis')" id="btn-fase-semis" class="fase-mm-btn px-4 py-2 bg-slate-800 text-slate-400 font-black text-xs rounded-lg transition-all">SEMIS</button>
                    <button onclick="filtrarMataMata('finais')" id="btn-fase-finais" class="fase-mm-btn px-4 py-2 bg-slate-800 text-slate-400 font-black text-xs rounded-lg transition-all">FINAIS</button>
                </div>
            </div>
            <div id="lista-jogos-matamata" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="aba-perfis" class="secao hidden max-w-md mx-auto">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-xl shadow-lg space-y-4">
                <div>
                    <h2 class="text-md font-black text-white italic uppercase tracking-wider">Novo Participante</h2>
                    <p class="text-[10px] text-slate-500 font-medium">Cadastre o nome exato para acesso via URL (?user=Nome)</p>
                </div>
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase text-slate-400 tracking-wider">Nome Completo</label>
                    <input type="text" id="novo-perfil-nome" placeholder="Ex: João Silva" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-3 text-sm text-white font-bold outline-none focus:ring-2 ring-blue-500">
                </div>
                <button onclick="cadastrarPerfil()" class="w-full bg-blue-600 text-white font-black text-xs p-3.5 rounded-lg shadow-md hover:bg-blue-700 transition-all uppercase tracking-wider">
                    ➕ INSERIR PARTICIPANTE
                </button>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-900/80 backdrop-blur border-t border-slate-800 p-4 z-40">
        <div class="container mx-auto max-w-4xl flex justify-between items-center">
            <p class="text-[10px] font-bold text-slate-500 uppercase max-w-xs hidden sm:block">Os placares preenchidos serão consolidados e as pontuações recalculadas do zero absoluto.</p>
            <button id="btn-main" onclick="processarAtualizacao()" class="w-full sm:w-auto bg-green-600 text-white font-black text-xs px-8 py-3.5 rounded-lg shadow-xl hover:bg-green-700 transition-all uppercase tracking-wider border border-green-700">
                SALVAR TUDO
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://auwzjdjyaqvqvznpfvif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q9azk8hCILivYJXe4JEOSQ_WVEolBhg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let dadosJogos = [];
        let filtroGrupoAtual = 'A';
        let filtroMataMataAtual = 'segundas';

        async function carregarDados() {
            const { data, error } = await _supabase.from('jogos').select('*').order('data_hora', { ascending: true });
            if (!error && data) {
                dadosJogos = data;
                renderizarFiltrosGrupos();
                renderizarPainelGrupos();
                renderizarPainelMataMata();
            }
        }

        function renderizarFiltrosGrupos() {
            const box = document.getElementById('botoes-filtros-grupos');
            if(!box) return;
            box.innerHTML = '';
            ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(g => {
                const act = filtroGrupoAtual === g;
                box.innerHTML += `
                    <button onclick="definirGrupoFiltro('${g}')" class="px-3.5 py-2 font-black text-xs rounded-lg transition-all ${act ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-800 text-slate-400'}">
                        G-${g}
                    </button>`;
            });
        }

        function definirGrupoFiltro(g) {
            filtroGrupoAtual = g;
            renderizarFiltrosGrupos();
            renderizarPainelGrupos();
        }

        function renderizarPainelGrupos() {
            const container = document.getElementById('lista-jogos-grupos');
            if(!container) return;
            container.innerHTML = '';
            const list = dadosJogos.filter(j => j.fase === `Grupo ${filtroGrupoAtual}`);
            container.innerHTML = list.map(j => cardAdminJogo(j)).join('');
        }

        function filtrarMataMata(fase) {
            filtroMataMataAtual = fase;
            document.querySelectorAll('.fase-mm-btn').forEach(b => {
                b.className = "fase-mm-btn px-4 py-2 bg-slate-800 text-slate-400 font-black text-xs rounded-lg transition-all";
            });
            document.getElementById(`btn-fase-${fase}`).className = "fase-mm-btn px-4 py-2 bg-blue-600 text-white font-black text-xs rounded-lg transition-all shadow-md";
            renderizarPainelMataMata();
        }

        function renderizarPainelMataMata() {
            const container = document.getElementById('lista-jogos-matamata');
            if(!container) return;
            container.innerHTML = '';
            const list = dadosJogos.filter(j => j.fase.toLowerCase().includes(filtroMataMataAtual.toLowerCase()));
            container.innerHTML = list.map(j => cardAdminJogo(j)).join('');
        }

        function cardAdminJogo(j) {
            const valA = j.gols_a_oficial !== null ? j.gols_a_oficial : '';
            const valB = j.gols_b_oficial !== null ? j.gols_b_oficial : '';
            const date = new Date(j.data_hora);
            const dtStr = date.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ' ' + date.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

            return `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl shadow flex flex-col justify-between">
                    <div class="flex justify-between items-center text-[9px] font-black uppercase text-slate-500 tracking-wider mb-3 border-b border-slate-800/60 pb-1">
                        <span>📅 ${dtStr}</span>
                        <span>${j.fase}</span>
                    </div>
                    <div class="grid grid-cols-7 items-center gap-2">
                        <div class="col-span-2 text-right font-black text-xs text-slate-200 uppercase tracking-tight truncate">${j.time_a}</div>
                        <div class="col-span-3 flex items-center justify-center gap-1.5 bg-slate-950 p-2 rounded-lg border border-slate-800 shadow-inner">
                            <input type="number" id="g-a-${j.id}" value="${valA}" placeholder="-" class="w-10 h-10 bg-slate-900 border border-slate-800 text-center font-black text-sm text-white rounded-md outline-none focus:ring-2 ring-blue-500">
                            <span class="text-[10px] font-black text-slate-600 uppercase">X</span>
                            <input type="number" id="g-b-${j.id}" value="${valB}" placeholder="-" class="w-10 h-10 bg-slate-900 border border-slate-800 text-center font-black text-sm text-white rounded-md outline-none focus:ring-2 ring-blue-500">
                        </div>
                        <div class="col-span-2 text-left font-black text-xs text-slate-200 uppercase tracking-tight truncate">${j.time_b}</div>
                    </div>
                </div>`;
        }

        async function processarAtualizacao() {
            const btn = document.getElementById('btn-main'); 
            btn.innerText = "🔄 SALVANDO...";
            btn.disabled = true;
            
            try {
                const inputsA = document.querySelectorAll('input[id^="g-a-"]');
                const promessasDeAtualizacao = [];

                for (let inputA of inputsA) {
                    const idJogo = inputA.id.replace('g-a-', '');
                    const gaValue = inputA.value;
                    const elB = document.getElementById(`g-b-${idJogo}`);
                    if (!elB) continue;
                    const gbValue = elB.value;

                    if (gaValue !== "" && gbValue !== "") {
                        promessasDeAtualizacao.push(
                            _supabase.from('jogos').update({ gols_a_oficial: parseInt(gaValue), gols_b_oficial: parseInt(gbValue) }).eq('id', idJogo)
                        );
                    } else if (gaValue === "" && gbValue === "") {
                        promessasDeAtualizacao.push(
                            _supabase.from('jogos').update({ gols_a_oficial: null, gols_b_oficial: null }).eq('id', idJogo)
                        );
                    }
                }
                
                if (promessasDeAtualizacao.length > 0) await Promise.all(promessasDeAtualizacao);
                
                const { error: rpcError } = await _supabase.rpc('admin_recalcular_tudo');
                if (rpcError) throw rpcError;

                alert("✅ Resultados oficiais salvos e ranking atualizado com sucesso!"); 
                await carregarDados();
            } catch (e) { 
                alert("Erro crítico: " + e.message); 
            }
            btn.innerText = "SALVAR TUDO"; btn.disabled = false;
        }

        async function cadastrarPerfil() {
            const input = document.getElementById('novo-perfil-nome');
            const nome = input.value.trim();
            if(!nome) return alert('Por favor, digite o nome.');

            const { error } = await _supabase.from('perfis').insert([{ nome: nome, pontos_total: 0 }]);
            if(error) alert('Erro: ' + error.message);
            else { alert(`✅ "${nome}" cadastrado!`); input.value = ''; await carregarDados(); }
        }

        function mudarAba(id) {
            document.querySelectorAll('.secao').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('aba-'+id).classList.remove('hidden');
            document.getElementById('tab-'+id).classList.add('tab-active');
        }

        window.onload = function() {
            mudarAba('grupos');
            carregarDados();
        };
    </script>
</body>
</html>
