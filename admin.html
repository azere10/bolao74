<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão74 - Painel Admin</title>
    <!-- Tailwind CSS para Estilização Premium -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- CDN do Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Personalização para o tema escuro premium */
        body {
            background-color: #0b132b;
            color: #f8fafc;
        }
        .card-grupo {
            background-color: #1c2541;
            border: 1px solid #2a3759;
        }
    </style>
</head>
<body class="min-h-screen font-sans antialiased pb-12">

    <!-- CABEÇALHO / BARRA SUPERIOR -->
    <header class="max-w-7xl mx-auto px-4 py-6 flex flex-col sm:flex-row justify-between items-center gap-4 border-b border-slate-800">
        <h1 class="text-3xl font-extrabold tracking-wider text-blue-400">BOLÃO74 ADMIN</h1>
        <div class="flex items-center gap-3">
            <button onclick="guardarTodosResultados()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-6 py-2.5 rounded-lg shadow-lg hover:shadow-emerald-900/30 transition-all transform active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                </svg>
                GUARDAR TUDO
            </button>
        </div>
    </header>

    <!-- BANNER DE FEEDBACK / NOTIFICAÇÕES (Substitui os pop-ups de alerta bloqueantes) -->
    <div id="feedback-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none max-w-md w-full px-4"></div>

    <!-- ECRÃ DE CARREGAMENTO (SPINNER) -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#0b132b]/80 z-40 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <p class="text-blue-300 font-medium">A carregar dados do Supabase...</p>
    </div>

    <!-- CONTEÚDO PRINCIPAL (GRUPOS E JOGOS) -->
    <main class="max-w-7xl mx-auto px-4 mt-8">
        <div id="grid-grupos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Os cartões dos grupos serão desenhados aqui dinamicamente -->
        </div>
    </main>

    <script>
        // =========================================================================
        // CONFIGURAÇÃO DO SUPABASE
        // =========================================================================
        const SUPABASE_URL = "https://auwzjdjyaqvqvznpfvif.supabase.co";
        
        // ATENÇÃO: Substitua o texto abaixo pela sua chave real (Project API anon key)
        // Encontra esta chave no painel do Supabase em: Settings -> API -> anon public
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1d3pqZGp5YXF2cXZ6bnBmdmlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDQ1MjMsImV4cCI6MjA5MTg4MDUyM30.GLjH9CjmDOujKYtO9-ZGtUXHkkenyS1CV1E-odMC4yQ"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Memória local para armazenamento de dados temporários
        let listaJogos = [];
        let listaPalpites = [];
        let listaPerfis = [];
        let regrasPontuacao = {};

        // Executado assim que a página termina de carregar
        window.addEventListener('DOMContentLoaded', async () => {
            if (SUPABASE_KEY === "SUA_CHAVE_ANON_DO_SUPABASE_AQUI") {
                mostrarNotificacao("Por favor, configure a sua chave Anon do Supabase no código!", "danger");
                document.getElementById('loading-overlay').classList.add('hidden');
                return;
            }
            await carregarDadosDoBanco();
        });

        /**
         * Procura todos os registos necessários para carregar a página e efetuar cálculos
         */
        async function carregarDadosDoBanco() {
            mostrarSpinner(true, "A aceder ao banco de dados...");
            try {
                // 1. Carrega as configurações de pontuação mais recentes (Resolve o Bug 3)
                const { data: config, error: errConfig } = await supabaseClient
                    .from('configuracoes')
                    .select('*')
                    .single();

                if (errConfig) {
                    console.warn("Tabela de configurações não encontrada. A usar valores padrão.");
                    regrasPontuacao = {
                        placarExato: 10,
                        vencedorGols: 7,
                        vencedorSimples: 5,
                        erro: 0
                    };
                } else {
                    regrasPontuacao = {
                        placarExato: config.pts_placar_exato || config.pts_exato || config.placar_exato || 10,
                        vencedorGols: config.pts_vencedor_gols || config.pts_saldo || config.saldo_gols || 7,
                        vencedorSimples: config.pts_vencedor_simples || config.pts_vencedor || config.vencedor_simples || 5,
                        erro: 0
                    };
                }

                // 2. Carrega todos os jogos agendados usando o mapeamento correto do seu banco
                const { data: jogos, error: errJogos } = await supabaseClient
                    .from('jogos')
                    .select('*')
                    .order('id', { ascending: true });

                if (errJogos) throw errJogos;
                listaJogos = jogos || [];

                // 3. Carrega palpites e perfis de utilizadores para o cálculo da classificação
                const { data: palpites, error: errPalpites } = await supabaseClient
                    .from('palpites')
                    .select('*');
                if (errPalpites) throw errPalpites;
                listaPalpites = palpites || [];

                const { data: perfis, error: errPerfis } = await supabaseClient
                    .from('perfis')
                    .select('*');
                if (errPerfis) throw errPerfis;
                listaPerfis = perfis || [];

                // Desenha os grupos no ecrã
                renderizarGrupos();

            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                mostrarNotificacao(`Falha ao conectar ao Supabase: ${error.message}`, "danger");
            } finally {
                mostrarSpinner(false);
            }
        }

        /**
         * Desenha dinamicamente as tabelas de grupos e os respetivos inputs de golos
         */
        function renderizarGrupos() {
            const grid = document.getElementById('grid-grupos');
            grid.innerHTML = "";

            const gruposMap = {};
            listaJogos.forEach(jogo => {
                // CORREÇÃO: Utilização da coluna real 'fase' do seu banco de dados jogos
                const grp = (jogo.fase || jogo.grupo || "Geral").toUpperCase();
                if (!gruposMap[grp]) gruposMap[grp] = [];
                gruposMap[grp].push(jogo);
            });

            Object.keys(gruposMap).sort().forEach(nomeGrupo => {
                const jogosDoGrupo = gruposMap[nomeGrupo];
                
                const card = document.createElement('div');
                card.className = "card-grupo rounded-xl p-5 flex flex-col justify-between shadow-xl transition-all duration-300";

                let htmlJogos = "";
                jogosDoGrupo.forEach(jogo => {
                    // CORREÇÃO: Mapeamento de colunas reais 'gols_a_oficial' e 'gols_b_oficial'
                    const golsM = jogo.gols_a_oficial !== null && jogo.gols_a_oficial !== undefined ? jogo.gols_a_oficial : "";
                    const golsV = jogo.gols_b_oficial !== null && jogo.gols_b_oficial !== undefined ? jogo.gols_b_oficial : "";
                    
                    // Identifica se o jogo está finalizado caso os golos estejam preenchidos
                    const isFinalizado = jogo.gols_a_oficial !== null && jogo.gols_b_oficial !== null;
                    const statusClass = isFinalizado ? 'border-emerald-500/50 bg-emerald-950/20' : 'border-slate-800 bg-slate-900/30';

                    htmlJogos += `
                        <div class="linha-jogo flex items-center justify-between py-2 border-b border-slate-800 last:border-b-0 gap-2 ${statusClass} rounded px-2 my-1 transition-all" data-jogo-id="${jogo.id}">
                            <!-- Equipa Mandante (time_a) -->
                            <span class="w-1/3 text-right text-xs sm:text-sm font-semibold text-slate-300 truncate">${jogo.time_a}</span>
                            
                            <!-- Inputs de Pontuação -->
                            <div class="flex items-center gap-1 justify-center w-1/3">
                                <input type="number" 
                                       placeholder="-" 
                                       value="${golsM}" 
                                       class="input-gols-mandante w-10 h-8 text-center bg-slate-800 text-white font-bold rounded border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-xs [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" />
                                <span class="text-xs text-slate-500 font-bold px-0.5">x</span>
                                <input type="number" 
                                       placeholder="-" 
                                       value="${golsV}" 
                                       class="input-gols-visitante w-10 h-8 text-center bg-slate-800 text-white font-bold rounded border border-slate-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-xs [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" />
                            </div>
                            
                            <!-- Equipa Visitante (time_b) -->
                            <span class="w-1/3 text-left text-xs sm:text-sm font-semibold text-slate-300 truncate">${jogo.time_b}</span>
                        </div>
                    `;
                });

                const classificacaoHTML = calcularClassificacaoGrupo(jogosDoGrupo);

                card.innerHTML = `
                    <div>
                        <h2 class="text-lg font-extrabold text-blue-400 mb-4 tracking-wide pb-1 border-b border-blue-500/20">${nomeGrupo.startsWith("GRUPO") ? nomeGrupo : "GRUPO " + nomeGrupo}</h2>
                        <div class="flex flex-col gap-1.5 mb-5">
                            ${htmlJogos}
                        </div>
                    </div>
                    <!-- Tabela de Classificação do Grupo -->
                    <div class="pt-4 border-t border-slate-800/80">
                        <div class="text-[11px] uppercase font-bold text-slate-400 mb-2">Classificação Provisória</div>
                        <div class="space-y-1">
                            ${classificacaoHTML}
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        /**
         * Calcula dinamicamente a tabela do grupo baseado nos golos introduzidos
         */
        function calcularClassificacaoGrupo(jogos) {
            const tabela = {};

            jogos.forEach(j => {
                if (!tabela[j.time_a]) tabela[j.time_a] = { pontos: 0, time: j.time_a };
                if (!tabela[j.time_b]) tabela[j.time_b] = { pontos: 0, time: j.time_b };

                if (j.gols_a_oficial !== null && j.gols_b_oficial !== null && j.gols_a_oficial !== undefined && j.gols_b_oficial !== undefined) {
                    const gM = parseInt(j.gols_a_oficial);
                    const gV = parseInt(j.gols_b_oficial);
                    
                    if (gM > gV) {
                        tabela[j.time_a].pontos += 3;
                    } else if (gM < gV) {
                        tabela[j.time_b].pontos += 3;
                    } else {
                        tabela[j.time_a].pontos += 1;
                        tabela[j.time_b].pontos += 1;
                    }
                }
            });

            const ordenados = Object.values(tabela).sort((a, b) => b.pontos - a.pontos);

            let htmlClassificacao = "";
            ordenados.forEach((equipe, index) => {
                let corColocacao = "text-slate-400";
                if (index === 0) corColocacao = "text-emerald-400 font-bold";
                if (index === 1) corColocacao = "text-blue-400 font-semibold";

                htmlClassificacao += `
                    <div class="flex justify-between items-center text-xs py-0.5 px-1 hover:bg-slate-800/30 rounded">
                        <span class="${corColocacao}">${index + 1}º ${equipe.time}</span>
                        <span class="font-mono font-bold text-slate-300">${equipe.pontos}pt</span>
                    </div>
                `;
            });

            return htmlClassificacao;
        }

        /**
         * Recolhe os golos e atualiza o banco de dados (Garante a cláusula WHERE - Resolve o Bug 1)
         */
        async function guardarTodosResultados() {
            mostrarSpinner(true, "A registar resultados oficiais...");
            
            const linhas = document.querySelectorAll('.linha-jogo');
            const atualizacoes = [];

            for (const linha of linhas) {
                const jogoId = linha.getAttribute('data-jogo-id');
                const inputM = inlineQuerySelectorSafe(linha, '.input-gols-mandante');
                const inputV = inlineQuerySelectorSafe(linha, '.input-gols-visitante');

                if (!inputM || !inputV) continue;

                // Validação crítica para evitar erros de integridade ou falta de ID
                if (!jogoId || jogoId === "undefined" || jogoId === "null") {
                    console.warn("Registo ignorado: Falta ID do jogo.");
                    continue;
                }

                // Ignora campos vazios para não fechar jogos sem pontuação
                if (inputM.value === "" || inputV.value === "") {
                    continue; 
                }

                const golsM = parseInt(inputM.value, 10);
                const golsV = parseInt(inputV.value, 10);

                if (isNaN(golsM) || isNaN(golsV)) {
                    continue;
                }

                // CORREÇÃO: Atualização com as colunas reais 'gols_a_oficial' e 'gols_b_oficial'
                atualizacoes.push(
                    supabaseClient
                        .from('jogos')
                        .update({
                            gols_a_oficial: golsM,
                            gols_b_oficial: golsV
                        })
                        .eq('id', jogoId) // EXIGIDO PELO SUPABASE PARA EVITAR O ERRO DO PRINT
                );
            }

            if (atualizacoes.length === 0) {
                mostrarSpinner(false);
                mostrarNotificacao("Nenhum resultado novo detetado para guardar.", "warning");
                return;
            }

            try {
                const resultados = await Promise.all(atualizacoes);
                
                // Valida se ocorreu erro durante os updates
                for (const r of resultados) {
                    if (r.error) throw r.error;
                }

                mostrarNotificacao("Resultados oficiais guardados com sucesso!", "success");
                
                // Recarrega todos os dados frescos do banco antes de recalcular
                await carregarDadosDoBanco();
                // Inicia o processo de atualização de pontuação
                await recalcularPontosGerais();

            } catch (error) {
                console.error("Erro ao guardar dados:", error);
                mostrarNotificacao(`Erro crítico: ${error.message}`, "danger");
                mostrarSpinner(false);
            }
        }

        // Função utilitária para buscar seletores com segurança
        function inlineQuerySelectorSafe(parent, selector) {
            try {
                return parent.querySelector(selector);
            } catch (e) {
                return null;
            }
        }

        /**
         * Processador inteligente que reconstrói a pontuação de todos os utilizadores a partir do zero (Resolve o Bug 2 e Bug 3)
         */
        async function recalcularPontosGerais() {
            mostrarSpinner(true, "A recalcular o ranking geral sem acumulações...");
            try {
                // 1. Garante a leitura das pontuações de referência mais recentes (Resolve Bug 3)
                const { data: config, error: configError } = await supabaseClient
                    .from('configuracoes')
                    .select('*')
                    .single();

                if (!configError && config) {
                    regrasPontuacao = {
                        placarExato: config.pts_placar_exato || config.pts_exato || config.placar_exato || 10,
                        vencedorGols: config.pts_vencedor_gols || config.pts_saldo || config.saldo_gols || 7,
                        vencedorSimples: config.pts_vencedor_simples || config.pts_vencedor || config.vencedor_simples || 5,
                        erro: 0
                    };
                }

                // 2. Inicializa o mapa com 0 pontos para todos os perfis (Zera os acumulados antigos - Resolve Bug 2)
                const mapaPontosNovos = {};
                listaPerfis.forEach(user => {
                    mapaPontosNovos[user.id] = 0; 
                });

                // Considera apenas jogos cujos golos oficiais já estejam preenchidos no banco de dados
                const jogosFinalizados = listaJogos.filter(j => j.gols_a_oficial !== null && j.gols_b_oficial !== null);
                const mapaJogos = new Map(jogosFinalizados.map(j => [j.id, j]));

                const updatesPalpites = [];
                
                // 3. Avalia os palpites apenas contra os jogos finalizados atuais na memória
                for (const palpite of listaPalpites) {
                    const jogo = mapaJogos.get(palpite.jogo_id);
                    
                    if (!jogo) continue; 

                    // CORREÇÃO: Avaliação baseada nas colunas reais do banco
                    const pontosDoPalpite = avaliarRegrasPalpite(palpite, jogo, regrasPontuacao);

                    // Adiciona atualização do palpite individual (se a sua tabela possuir a coluna pontos_obtidos)
                    // Para evitar que o script quebre caso a coluna não exista, executamos de forma isolada
                    try {
                        updatesPalpites.push(
                            supabaseClient
                                .from('palpites')
                                .update({ pontos_obtidos: pontosDoPalpite })
                                .eq('id', palpite.id)
                        );
                    } catch (e) {
                        console.warn("Coluna 'pontos_obtidos' não encontrada na tabela palpites.");
                    }

                    // Soma de forma limpa na memória sem ler acumulados anteriores do banco
                    if (mapaPontosNovos[palpite.user_id] !== undefined) {
                        mapaPontosNovos[palpite.user_id] += pontosDoPalpite;
                    }
                }

                if (updatesPalpites.length > 0) {
                    // Executa os updates dos palpites (em background) de forma segura
                    try {
                        await Promise.all(updatesPalpites);
                    } catch (e) {
                        console.warn("Falha silenciosa ao guardar pontos_obtidos nos palpites individuais:", e);
                    }
                }

                // 4. Sobrescreve o total calculado na coluna 'pontos_total' da tabela 'perfis'
                const updatesPerfis = Object.keys(mapaPontosNovos).map(userId => {
                    return supabaseClient
                        .from('perfis')
                        .update({ pontos_total: mapaPontosNovos[userId] }) // CORREÇÃO: coluna pontos_total
                        .eq('id', userId);
                });

                const resultadosPerfis = await Promise.all(updatesPerfis);
                for (const r of resultadosPerfis) {
                    if (r.error) throw r.error;
                }

                mostrarNotificacao("Ranking e pontuações recalculados com sucesso!", "success");
                
                // Recarrega o ecrã com a classificação e valores atualizados
                await carregarDadosDoBanco();

            } catch (error) {
                console.error("Erro no recálculo geral:", error);
                mostrarNotificacao(`Erro no recálculo: ${error.message}`, "danger");
            } finally {
                mostrarSpinner(false);
            }
        }

        /**
         * Motor de regras: compara o palpite contra o resultado real oficial do jogo
         */
        function avaliarRegrasPalpite(palpite, jogo, regras) {
            // CORREÇÃO: Mapeamento de colunas reais 'palpite_a', 'palpite_b', 'gols_a_oficial', 'gols_b_oficial'
            const pM = parseInt(palpite.palpite_a);
            const pV = parseInt(palpite.palpite_b);
            const jM = parseInt(jogo.gols_a_oficial);
            const jV = parseInt(jogo.gols_b_oficial);

            if (isNaN(pM) || isNaN(pV) || isNaN(jM) || isNaN(jV)) return 0;

            const vencedorPalpite = pM > pV ? 1 : (pM < pV ? 2 : 0);
            const vencedorReal = jM > jV ? 1 : (jM < jV ? 2 : 0);

            // Regra 1: Acertou o Placar Cheio
            if (pM === jM && pV === jV) {
                return regras.placarExato;
            }

            // Se errou a tendência (vencedor ou empate), pontua zero
            if (vencedorPalpite !== vencedorReal) {
                return regras.erro;
            }

            // Regra 2: Acertou Vencedor + Gols de uma das equipas
            if (pM === jM || pV === jV) {
                return regras.vencedorGols;
            }

            // Regra 3: Acertou apenas a tendência simples (Vencedor ou Empate Simples)
            return regras.vencedorSimples;
        }

        /**
         * Controla o painel visual de carregamento
         */
        function mostrarSpinner(visivel, mensagem = "A carregar...") {
            const overlay = document.getElementById('loading-overlay');
            const texto = overlay.querySelector('p');
            texto.textContent = mensagem;

            if (visivel) {
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
            } else {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }

        /**
         * Cria caixas de alerta dinâmicas no canto do ecrã sem travar a navegação
         */
        function mostrarNotificacao(mensagem, tipo = 'info') {
            const container = document.getElementById('feedback-container');
            const alertBox = document.createElement('div');
            
            let classesTipo = 'bg-blue-600 border-blue-500 text-white';
            if (tipo === 'success') classesTipo = 'bg-emerald-800/90 border-emerald-500 text-emerald-200';
            if (tipo === 'warning') classesTipo = 'bg-amber-800/90 border-amber-500 text-amber-200';
            if (tipo === 'danger') classesTipo = 'bg-red-900/90 border-red-600 text-red-200';

            alertBox.className = `p-4 rounded-xl border shadow-2xl flex justify-between items-center transform transition-all duration-300 translate-y-2 opacity-0 pointer-events-auto ${classesTipo}`;
            alertBox.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="font-medium text-xs sm:text-sm">${mensagem}</span>
                </div>
                <button onclick="this.parentElement.remove()" class="text-white hover:text-slate-300 font-bold ml-4 text-xs">✕</button>
            `;

            container.appendChild(alertBox);

            setTimeout(() => {
                alertBox.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            setTimeout(() => {
                alertBox.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => {
                    alertBox.remove();
                }, 300);
            }, 5000);
        }
    </script>
</body>
</html>
