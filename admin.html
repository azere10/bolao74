<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão do Maurinho - Painel Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0b132b; color: #f8fafc; }
        .card-grupo { background-color: #1c2541; border: 1px solid #2a3759; }
    </style>
</head>
<body class="min-h-screen p-4">

    <!-- Cabeçalho (Mantendo o layout original) -->
    <header class="max-w-7xl mx-auto py-6 border-b border-slate-800">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-extrabold text-blue-400">BOLÃO DO MAURINHO ADMIN</h1>
            <div class="flex bg-slate-900 p-1 rounded-lg">
                <button onclick="mudarAba('jogos')" class="px-4 py-2 bg-blue-600 rounded">CONTROLE DE JOGOS</button>
                <button onclick="mudarAba('matamata')" class="px-4 py-2">MATA-MATA</button>
                <button onclick="mudarAba('users')" class="px-4 py-2">GESTÃO DE UTILIZADORES</button>
            </div>
            <button onclick="guardarTodosResultados()" class="bg-emerald-600 px-6 py-2 rounded">GUARDAR TUDO</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto mt-8">
        <!-- ABA JOGOS (Foco em Grupos) -->
        <section id="aba-jogos" class="grid grid-cols-3 gap-4">
            <div id="grid-jogos" class="contents"></div>
        </section>
        
        <!-- ABAS MATA-MATA e USERS ocultas por padrão -->
        <section id="aba-matamata" class="hidden text-center text-slate-500">Em breve...</section>
        <section id="aba-users" class="hidden text-center text-slate-500">Em breve...</section>
    </main>

    <script>
        const SUPABASE_URL = "https://auwzjdjyaqvqvznpfvif.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1d3pqZGp5YXF2cXZ6bnBmdmlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMDQ1MjMsImV4cCI6MjA5MTg4MDUyM30.GLjH9CjmDOujKYtO9-ZGtUXHkkenyS1CV1E-odMC4yQ"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarDados() {
            const { data } = await supabaseClient.from('jogos').select('*');
            renderizar(data || []);
        }

        function mudarAba(aba) {
            document.getElementById('aba-jogos').classList.toggle('hidden', aba !== 'jogos');
            document.getElementById('aba-matamata').classList.toggle('hidden', aba !== 'matamata');
            document.getElementById('aba-users').classList.toggle('hidden', aba !== 'users');
        }

        function renderizar(jogos) {
            const grid = document.getElementById('grid-jogos');
            grid.innerHTML = "";
            // Filtro para mostrar apenas Grupos, como solicitado no print
            jogos.filter(j => (j.fase || "").toUpperCase().includes("GRUPO")).forEach(j => {
                const card = document.createElement('div');
                card.className = "card-grupo p-4 rounded flex justify-between items-center text-sm";
                card.innerHTML = `<span>${j.time_a} ${j.gols_a_oficial || '-'} x ${j.gols_b_oficial || '-'} ${j.time_b}</span>`;
                grid.appendChild(card);
            });
        }
        carregarDados();
    </script>
</body>
</html>
