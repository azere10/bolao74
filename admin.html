<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Master Admin - Bolão74</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .jogo-passado { opacity: 0.7; border-left: 4px solid #475569; }
        .jogo-futuro { border-left: 4px solid #22c55e; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen pb-20">

    <div id="login-admin" class="max-w-sm mx-auto mt-20 bg-slate-900 p-8 rounded-2xl shadow-2xl border border-slate-800 text-center">
        <h2 class="text-2xl font-black mb-6 tracking-tighter">CONTROLE MESTRE</h2>
        <input type="password" id="senha-admin" placeholder="Senha de Acesso" class="w-full p-4 bg-slate-800 border border-slate-700 rounded-xl mb-4 text-center text-xl focus:ring-2 ring-blue-500 outline-none">
        <button onclick="verificarSenha()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-black transition-all">ACESSAR PAINEL</button>
    </div>

    <div id="painel-admin" class="hidden container mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white italic">ADMIN <span class="text-blue-500">BOLÃO74</span></h1>
                <p class="text-slate-500 text-sm">Gerenciamento de Resultados e Grupos</p>
            </div>
            <button onclick="processarAtualizacao()" id="btn-main" class="bg-green-600 hover:bg-green-500 text-white font-black px-8 py-4 rounded-xl shadow-lg transition-all scale-105 active:scale-95">
                SALVAR E RECALCULAR TUDO
            </button>
        </header>

        <div id="dashboard" class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div id="lista-datas" class="lg:col-span-7 space-y-4">
                </div>

            <div class="lg:col-span-5">
                <div class="sticky top-24 bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl">
                    <h3 class="text-xl font-black mb-4 flex items-center gap-2">
                        <span id="grupo-titulo">TABELA DO GRUPO</span>
                        <span class="text-[10px] bg-slate-800 px-2 py-1 rounded text-slate-400 font-normal uppercase">Simulação Realtime</span>
                    </h3>
                    <div class="overflow-hidden rounded-xl border border-slate-800">
                        <table class="w-full text-sm">
                            <thead class="bg-slate-800 text-slate-400 text-[10px] uppercase font-bold">
                                <tr>
                                    <th class="p-3 text-left">Seleção</th>
                                    <th class="p-3 text-center">P</th>
                                    <th class="p-3 text-center">V</th>
                                    <th class="p-3 text-center">SG</th>
                                    <th class="p-3 text-center">GP</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-corpo" class="divide-y divide-slate-800">
                                <tr><td colspan="5" class="p-8 text-center text-slate-600 italic">Selecione um jogo para ver a tabela</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://auwzjdjyaqvqvznpfvif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q9azk8hCILivYJXe4JEOSQ_WVEolBhg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const SENHA_MESTRA = "1234"; // AJUSTE SUA SENHA AQUI
        let todosJogos = [];

        function verificarSenha() {
            if(document.getElementById('senha-admin').value === SENHA_MESTRA) {
                document.getElementById('login-admin').classList.add('hidden');
                document.getElementById('painel-admin').classList.remove('hidden');
                carregarDados();
            } else { alert("Senha Incorreta!"); }
        }

        async function carregarDados() {
            const { data } = await _supabase.from('jogos').select('*').order('data_hora', { ascending: true });
            todosJogos = data;
            renderizarListaPorDatas();
        }

        function renderizarListaPorDatas() {
            const container = document.getElementById('lista-datas');
            const agora = new Date();
            
            // Agrupar por data
            const grupos = todosJogos.reduce((acc, jogo) => {
                const dataStr = new Date(jogo.data_hora).toLocaleDateString('pt-BR');
                if (!acc[dataStr]) acc[dataStr] = [];
                acc[dataStr].push(jogo);
                return acc;
            }, {});

            container.innerHTML = '';

            Object.keys(grupos).forEach(data => {
                const dataObjeto = new Date(grupos[data][0].data_hora);
                const isPassado = dataObjeto < agora.setHours(0,0,0,0);
                
                const section = document.createElement('div');
                section.className = `bg-slate-900 rounded-2xl overflow-hidden border border-slate-800 transition-all ${isPassado ? 'opacity-60' : ''}`;
                
                section.innerHTML = `
                    <button onclick="this.nextElementSibling.classList.toggle('hidden')" class="w-full p-5 flex justify-between items-center bg-slate-800/50 hover:bg-slate-800 transition-colors">
                        <span class="font-black tracking-tight text-lg">${data} ${isPassado ? ' <span class="text-[10px] text-slate-500 ml-2">(ENCERRADO)</span>' : ''}</span>
                        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="${isPassado ? 'hidden' : ''} p-4 space-y-3">
                        ${grupos[data].map(j => `
                            <div onclick="simularGrupo('${j.fase}')" class="group flex items-center justify-between p-4 bg-slate-950 rounded-xl border border-slate-800 hover:border-blue-500 cursor-pointer transition-all">
                                <div class="flex-1">
                                    <p class="text-[9px] text-blue-500 font-bold uppercase tracking-widest mb-1">${j.fase}</p>
                                    <div class="flex items-center gap-3">
                                        <span class="font-bold w-24 text-right">${j.time_a}</span>
                                        <div class="flex gap-1">
                                            <input type="number" oninput="simularGrupo('${j.fase}')" id="g-a-${j.id}" value="${j.gols_a_oficial ?? ''}" class="w-12 h-10 bg-slate-800 rounded border border-slate-700 text-center font-black text-blue-400 focus:ring-2 ring-blue-500 outline-none transition-all">
                                            <input type="number" oninput="simularGrupo('${j.fase}')" id="g-b-${j.id}" value="${j.gols_b_oficial ?? ''}" class="w-12 h-10 bg-slate-800 rounded border border-slate-700 text-center font-black text-blue-400 focus:ring-2 ring-blue-500 outline-none transition-all">
                                        </div>
                                        <span class="font-bold w-24 text-left">${j.time_b}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function simularGrupo(fase) {
            document.getElementById('grupo-titulo').innerText = `TABELA ${fase.toUpperCase()}`;
            const jogosDoGrupo = todosJogos.filter(j => j.fase === fase);
            const tabela = {};

            // Inicializar times
            jogosDoGrupo.forEach(j => {
                if (!tabela[j.time_a]) tabela[j.time_a] = { pts: 0, v: 0, gp: 0, gc: 0, sg: 0, nome: j.time_a };
                if (!tabela[j.time_b]) tabela[j.time_b] = { pts: 0, v: 0, gp: 0, gc: 0, sg: 0, nome: j.time_b };
            });

            // Calcular com dados atuais (inputs + banco)
            jogosDoGrupo.forEach(j => {
                const ga = parseInt(document.getElementById(`g-a-${j.id}`).value);
                const gb = parseInt(document.getElementById(`g-b-${j.id}`).value);

                if (!isNaN(ga) && !isNaN(gb)) {
                    tabela[j.time_a].gp += ga; tabela[j.time_a].gc += gb;
                    tabela[j.time_b].gp += gb; tabela[j.time_b].gc += ga;
                    if (ga > gb) { tabela[j.time_a].pts += 3; tabela[j.time_a].v += 1; }
                    else if (gb > ga) { tabela[j.time_b].pts += 3; tabela[j.time_b].v += 1; }
                    else { tabela[j.time_a].pts += 1; tabela[j.time_b].pts += 1; }
                }
            });

            // Critérios de desempate FIFA: 1. Pts, 2. SG, 3. GP
            const ranking = Object.values(tabela).sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                const sgA = a.gp - a.gc; const sgB = b.gp - b.gc;
                if (sgB !== sgA) return sgB - sgA;
                return b.gp - a.gp;
            });

            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = ranking.map((t, i) => `
                <tr class="${i < 2 ? 'bg-blue-500/5' : ''}">
                    <td class="p-3 font-bold flex items-center gap-2"><span class="text-[10px] text-slate-500">${i+1}</span> ${t.nome}</td>
                    <td class="p-3 text-center font-black text-white">${t.pts}</td>
                    <td class="p-3 text-center">${t.v}</td>
                    <td class="p-3 text-center text-slate-400">${t.gp - t.gc}</td>
                    <td class="p-3 text-center text-slate-400">${t.gp}</td>
                </tr>
            `).join('');
        }

        async function processarAtualizacao() {
            const btn = document.getElementById('btn-main');
            btn.innerText = "🔄 PROCESSANDO...";
            btn.disabled = true;

            try {
                for (let j of todosJogos) {
                    const ga = document.getElementById(`g-a-${j.id}`).value;
                    const gb = document.getElementById(`g-b-${j.id}`).value;

                    if (ga !== "" && gb !== "") {
                        await _supabase.rpc('admin_atualizar_placar', {
                            id_jogo: j.id, g_a: parseInt(ga), g_b: parseInt(gb)
                        });
                    }
                }
                await _supabase.rpc('admin_recalcular_tudo');
                alert("✨ Tudo atualizado com sucesso!");
                location.reload();
            } catch (e) {
                alert("Erro: " + e.message);
                btn.disabled = false;
                btn.innerText = "SALVAR E RECALCULAR TUDO";
            }
        }
    </script>
</body>
</html>
