<body class="bg-slate-950 text-slate-200 font-sans min-h-screen pb-20">

    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-blue-500">BOLÃO74 ADMIN</h1>
            <nav class="flex gap-2 bg-black p-1 rounded-lg">

            <button onclick="processarAtualizacao()" id="btn-main" class="bg-green-600 px-6 py-2 rounded-lg font-black text-sm">SALVAR TUDO</button>
        </div>

        <div id="aba-segundas" class="secao hidden space-y-8"></div>
        <div id="aba-oitavas" class="secao hidden space-y-8"></div>
        <div id="aba-finais" class="secao hidden space-y-8"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://auwzjdjyaqvqvznpfvif.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Q9azk8hCILivYJXe4JEOSQ_WVEolBhg';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let todosJogos = [];
        let rankings = {};

        // MAPEAMENTO DO CHAVEAMENTO (Baseado na imagem FIFA)

        { id: "J75", timeA: "1F", timeB: "2C", data: "2026-06-29 22:00", proximo: "J90", pos: "B" },
        { id: "J77", timeA: "1I", timeB: "3C/D/F/G/H", data: "2026-06-30 18:00", proximo: "J89", pos: "B" },

        { id: "J76", timeA: "1C", timeB: "2F", data: "2026-06-29 14:00", proximo: "J91", pos: "A" },

        { id: "J79", timeA: "1A", timeB: "3C/E/F/H/I", data: "2026-06-30 22:00", proximo: "J92", pos: "A" },
        { id: "J80", timeA: "1L", timeB: "3E/H/I/J/K", data: "2026-07-01 13:00", proximo: "J92", pos: "B" },
        { id: "J85", timeA: "1B", timeB: "3E/F/G/I/J", data: "2026-07-03 00:00", proximo: "J96", pos: "A" },

        { id: "J86", timeA: "1J", timeB: "2H", data: "2026-07-03 19:00", proximo: "J95", pos: "A" },
        { id: "J88", timeA: "2D", timeB: "2G", data: "2026-07-03 15:00", proximo: "J95", pos: "B" }
    ],
    "oitavas": [
        { id: "J89", timeA: "Venc J74", timeB: "Venc J77", data: "2026-07-04 18:00", proximo: "J97", pos: "A" },
        { id: "J90", timeA: "Venc J73", timeB: "Venc J75", data: "2026-07-04 14:00", proximo: "J97", pos: "B" },
        { id: "J91", timeA: "Venc J76", timeB: "Venc J78", data: "2026-07-05 17:00", proximo: "J99", pos: "A" },
        { id: "J92", timeA: "Venc J79", timeB: "Venc J80", data: "2026-07-05 21:00", proximo: "J99", pos: "B" },
        { id: "J93", timeA: "Venc J83", timeB: "Venc J84", data: "2026-07-06 16:00", proximo: "J98", pos: "A" },
        { id: "J94", timeA: "Venc J81", timeB: "Venc J82", data: "2026-07-06 21:00", proximo: "J98", pos: "B" },
        { id: "J95", timeA: "Venc J86", timeB: "Venc J88", data: "2026-07-07 13:00", proximo: "J100", pos: "A" },
        { id: "J96", timeA: "Venc J85", timeB: "Venc J87", data: "2026-07-07 17:00", proximo: "J100", pos: "B" }
    ],
    "finais": [
        // Quartas
        { id: "J97", timeA: "Venc J89", timeB: "Venc J90", data: "2026-07-09 17:00", proximo: "J101", pos: "A" },
        { id: "J98", timeA: "Venc J93", timeB: "Venc J94", data: "2026-07-10 16:00", proximo: "J101", pos: "B" },
        { id: "J99", timeA: "Venc J91", timeB: "Venc J92", data: "2026-07-11 18:00", proximo: "J102", pos: "A" },
        { id: "J100", timeA: "Venc J95", timeB: "Venc J96", data: "2026-07-11 22:00", proximo: "J102", pos: "B" },
        // Semifinais
        { id: "J101", timeA: "Venc J97", timeB: "Venc J98", data: "2026-07-14 16:00", proximo: "J104", pos: "A" },
        { id: "J102", timeA: "Venc J99", timeB: "Venc J100", data: "2026-07-15 16:00", proximo: "J104", pos: "B" },
        // 3º Lugar e Final
        { id: "J103", timeA: "Perd J101", timeB: "Perd J102", data: "2026-07-18 18:00", proximo: null, pos: null },
        { id: "J104", timeA: "Venc J101", timeB: "Venc J102", data: "2026-07-19 16:00", proximo: null, pos: null }
    ]
};

        async function carregarDados() {
            const { data } = await _supabase.from('jogos').select('*').order('data_hora', { ascending: true });
            todosJogos = data;
            calcularRankings();
            renderizarGrupos();
            renderizarMataMata('segundas');
            renderizarMataMata('oitavas');
        }

        function calcularRankings() {
            const grupos = [...new Set(todosJogos.filter(j => j.fase.includes('Grupo')).map(j => j.fase))];
            rankings = {};
            grupos.forEach(fase => {
                const jf = todosJogos.filter(j => j.fase === fase);
                const tab = {};
                jf.forEach(j => {
                    [j.time_a, j.time_b].forEach(t => { if(!tab[t]) tab[t] = {pts:0, sg:0, gp:0, nome:t}; });
                    if(j.gols_a_oficial !== null) {
                        tab[j.time_a].gp += j.gols_a_oficial; tab[j.time_a].sg += (j.gols_a_oficial - j.gols_b_oficial);
                        tab[j.time_b].gp += j.gols_b_oficial; tab[j.time_b].sg += (j.gols_b_oficial - j.gols_a_oficial);
                        if(j.gols_a_oficial > j.gols_b_oficial) tab[j.time_a].pts += 3;
                        else if(j.gols_b_oficial > j.gols_a_oficial) tab[j.time_b].pts += 3;
                        else { tab[j.time_a].pts += 1; tab[j.time_b].pts += 1; }
                    }
                });
                rankings[fase] = Object.values(tab).sort((a,b) => b.pts - a.pts || b.sg - a.sg || b.gp - a.gp);
            });
        }

        function renderizarGrupos() {
            const container = document.getElementById('aba-grupos');
            container.innerHTML = Object.keys(rankings).map(fase => `
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <h2 class="text-blue-500 font-black mb-4 uppercase text-sm">${fase}</h2>
                    <div class="space-y-2 mb-4">
                        ${todosJogos.filter(j => j.fase === fase).map(j => `
                            <div class="flex items-center gap-2 text-xs">
                                <span class="w-20 text-right">${j.time_a}</span>
                                <input type="number" id="g-a-${j.id}" value="${j.gols_a_oficial ?? ''}" class="w-8 h-8 bg-slate-800 border border-slate-700 text-center rounded">
                                <input type="number" id="g-b-${j.id}" value="${j.gols_b_oficial ?? ''}" class="w-8 h-8 bg-slate-800 border border-slate-700 text-center rounded">
                                <span class="w-20">${j.time_b}</span>
                            </div>
                        `).join('')}
                    </div>
                    <table class="w-full text-[10px] border-t border-slate-800 pt-2">
                        ${rankings[fase].map((t, i) => `<tr class="${i<2?'text-green-400':''}"><td>${i+1}º ${t.nome}</td><td class="text-right">${t.pts}p</td></tr>`).join('')}
                    </table>
                </div>
            `).join('');
        }

        function renderizarMataMata(aba) {
            const container = document.getElementById('aba-'+aba);
            const configuracoes = MAPA_MATA_MATA[aba];
            
            container.innerHTML = configuracoes.map(conf => {
                const jogoExistente = todosJogos.find(j => j.fase.includes(conf.id));
                // Lógica de sugestão
                let sugA = conf.timeA;
                let sugB = conf.timeB;

                // Tenta resolver 1A, 2B, etc
                if(conf.timeA.match(/^[12][A-L]$/)) {
                    const f = "Grupo " + conf.timeA[1];
                    const pos = parseInt(conf.timeA[0]) - 1;
                    sugA = rankings[f] && rankings[f][pos] ? rankings[f][pos].nome : conf.timeA;
                }
                // Tenta resolver vencedor de J anterior
                if(conf.timeA.startsWith("Venc J")) {
                    const jAnt = todosJogos.find(j => j.fase.includes(conf.timeA.split(' ')[1]));
                    if(jAnt && jAnt.gols_a_oficial !== null) {
                        sugA = jAnt.gols_a_oficial > jAnt.gols_b_oficial ? jAnt.time_a : jAnt.time_b;
                    }
                }

                return `
                    <div class="bg-slate-900 p-6 rounded-2xl border ${jogoExistente ? 'border-slate-800' : 'border-blue-500/50 bg-blue-900/10'} flex flex-col md:flex-row items-center justify-between gap-4">
                        <div class="text-center md:text-left">
                            <span class="text-blue-500 font-bold text-xl">#${conf.id}</span>
                            <p class="text-xs text-slate-500">${conf.data}</p>
                        </div>
                        <div class="flex items-center gap-4 font-black text-xl">
                            <span class="${sugA.length > 3 ? 'text-white' : 'text-slate-600'}">${sugA}</span>
                            ${jogoExistente ? 
                                `<input type="number" id="g-a-${jogoExistente.id}" value="${jogoExistente.gols_a_oficial ?? ''}" class="w-12 h-12 bg-slate-800 border-2 border-blue-500 rounded text-center">
                                 <input type="number" id="g-b-${jogoExistente.id}" value="${jogoExistente.gols_b_oficial ?? ''}" class="w-12 h-12 bg-slate-800 border-2 border-blue-500 rounded text-center">` 
                                : `<span class="text-slate-700 italic text-sm">Aguardando oficialização</span>`
                            }
                            <span class="${sugB.length > 3 ? 'text-white' : 'text-slate-600'}">${sugB}</span>
                        </div>
                        ${!jogoExistente ? 
                            `<button onclick="oficializar('${sugA}', '${sugB}', '${aba.toUpperCase()}: ${conf.id}', '${conf.data}')" class="bg-blue-600 px-4 py-2 rounded font-bold text-xs">CRIAR NO BANCO</button>` 
                            : `<span class="text-green-500 text-xs font-bold uppercase">Jogo Oficial</span>`
                        }
                    </div>
                `;
            }).join('');
        }

        async function oficializar(ta, tb, fase, data) {
            if(ta.length <= 3 || tb.length <= 3) return alert("Os times ainda não foram definidos pelos resultados dos grupos!");
            const { error } = await _supabase.from('jogos').insert([{ time_a: ta, time_b: tb, fase: fase, data_hora: new Date(data.replace(' ', 'T') + ':00Z').toISOString() }]);
            if(!error) { alert("Jogo criado!"); carregarDados(); }
        }

        async function processarAtualizacao() {
            const btn = document.getElementById('btn-main'); btn.innerText = "🔄 SALVANDO...";
            for (let j of todosJogos) {
                const ga = document.getElementById(`g-a-${j.id}`)?.value;
                const gb = document.getElementById(`g-b-${j.id}`)?.value;
                if(ga !== undefined && ga !== "" && gb !== "") {
                    await _supabase.rpc('admin_atualizar_placar', { id_jogo: j.id, g_a: parseInt(ga), g_b: parseInt(gb) });
                }
            }
            await _supabase.rpc('admin_recalcular_tudo');
            alert("Sucesso!"); carregarDados();
            btn.innerText = "SALVAR TUDO";
        }

        function mudarAba(id) {
            document.querySelectorAll('.secao').forEach(s => s.classList.add('hidden'));
            document.getElementById('aba-'+id).classList.remove('hidden');
        }

        carregarDados();
    </script>
</body>
</html>
